<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05050b">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>HOTDOG NIGHTS - Xtreme Action Park</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#05050b; color:#e8e8f0;
    font-family:"Trebuchet MS","Segoe UI",sans-serif; overflow:hidden;
    overscroll-behavior:none; touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; }
  #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { background:#05050b; image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:100%; max-height:100%; box-shadow:0 0 60px rgba(255,59,59,.25),0 0 120px rgba(52,231,255,.15);
    border:2px solid #1a1a2e; touch-action:none; cursor:crosshair; }
  #hint { position:fixed; bottom:8px; left:0; right:0; text-align:center;
    font-size:12px; color:#5a5a7a; pointer-events:none; }
  #nm { position:fixed; left:50%; top:46%; transform:translate(-50%,-50%); width:280px; padding:10px 12px;
    font:bold 20px "Trebuchet MS",sans-serif; text-align:center; background:#101018; color:#fff;
    border:2px solid #34e7ff; border-radius:6px; display:none; z-index:10; outline:none; }
  /* Hidden cheat-code console, opened from Options via 4+5+6 (or triple-tap the secret "?"). */
  #cc { position:fixed; left:50%; top:62%; transform:translate(-50%,-50%); width:300px; padding:10px 12px;
    font:bold 18px "Trebuchet MS",sans-serif; text-align:center; background:#101018; color:#f4d03f;
    border:2px solid #f4d03f; border-radius:6px; display:none; z-index:11; outline:none; letter-spacing:3px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="600"></canvas></div>
<input id="nm" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="14" placeholder="your name">
<input id="cc" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="10" placeholder="enter code">
<div id="hint">WASD / on-screen sticks &middot; aim+fire &middot; 1-4 weapons &middot; P pause (O options) &middot; M mute</div>
<script>
(() => {
"use strict";
//============================================================ SETUP
const cv = document.getElementById("game");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;
ctx.imageSmoothingEnabled = false;
const TS = 32, MW = 44, MH = 32;
const WORLD_W = MW*TS, WORLD_H = MH*TS;
const BS = 4; // boss sprite scale
const lcv = document.createElement("canvas"); lcv.width = W; lcv.height = H;
const lctx = lcv.getContext("2d");

//============================================================ INPUT
const keys = {};
let mouseX = W/2, mouseY = H/2, firing = false;
// Triple-tap detector for keyboard cheat codes (J / 7 / M). Ignores auto-repeat; window resets per key.
const taps = {};
function tripleTap(key){ const now=performance.now(); const a=taps[key]||(taps[key]=[]);
  a.push(now); while(a.length && now-a[0]>700) a.shift(); return a.length>=3; }
addEventListener("keydown", e => {
  if (state === "name"){ handleNameKey(e); return; }
  if (state === "settings"){ handleSettingsKey(e); return; }
  if (state === "charselect"){ handleCharKey(e); return; }
  if (state === "difficulty"){ handleDiffKey(e); return; }
  if (state === "help"){ if(["Enter"," "].includes(e.key)) helpAdvance();
    else if(["Escape","Backspace","h","H"].includes(e.key)) state=helpFrom; e.preventDefault(); return; }
  const k = e.key.toLowerCase(); keys[k] = true;
  if (/^[a-z]$/.test(k)){ cheatBuf=(cheatBuf+k).slice(-8); if(cheatBuf.endsWith("moonk")) activateMoonk(); }
  if ([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) e.preventDefault();
  if (k === "g" && state === "win"){ startGodLevel(); return; }
  if (k === "h" && (state === "title" || state === "pause")){ openHelp(state); return; }
  // ---- in-game cheat codes (triple-tap, play only) ----
  if (k === "j" && state === "play" && !e.repeat){
    if (tripleTap("j")){ taps.j=[]; if(!cheats.jump) activateCheat("jump"); else doJump(); }
    else if (cheats.jump) doJump(); }
  if (k === "7" && state === "play" && !e.repeat && tripleTap("7")){ taps["7"]=[]; activateCheat("doctor"); }
  if (k === "enter") startOrAdvance();
  if (k === "p" || k === "escape") togglePause();
  if (k === "m"){
    if (state === "play" && !e.repeat){
      if (!(taps.m && taps.m.length)) muteSeq = muted;   // remember mute state before a potential 3-tap burst
      muted = !muted;
      if (tripleTap("m")){ taps.m=[]; muted = muteSeq; activateCheat("minions"); }   // restore mute, fire minions
    } else muted = !muted;
  }
  if (k === "s" && state === "title") openSettings("title");
  if (k === "o" && state === "pause") openSettings("pause");
  if (k === "f") toggleFullscreen();
  if (/^[1-9]$/.test(k) && player.weapons){ const i = +k-1; if (i < player.weapons.length) player.weapon = i; }
});
function handleNameKey(e){
  if (e.key === "Enter"){ if (playerName.trim()){ playerName = playerName.trim(); localStorage.setItem("hotdogNights.name", playerName); if(playerName.toLowerCase()==="moonk") activateMoonk(); state="charselect"; } e.preventDefault(); return; }
  if (e.key === "Backspace"){ playerName = playerName.slice(0,-1); e.preventDefault(); return; }
  if (e.key.length === 1 && /[A-Za-z0-9 _!\-]/.test(e.key) && playerName.length < 14){ playerName += e.key; e.preventDefault(); }
}
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false;
  if (["4","5","6"].includes(e.key)) numDown[e.key] = false; });
function canvasPos(e){ const r = cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) }; }
cv.addEventListener("mousemove", e => { const p = canvasPos(e); mouseX = p.x; mouseY = p.y; });
cv.addEventListener("mousedown", e => { audioInit();
  if (state==="settings"){ const p=canvasPos(e);   // secret "?" : tap shows hint, triple-tap opens console
    if (qHot && p.x>=qHot.x && p.x<=qHot.x+qHot.w && p.y>=qHot.y && p.y<=qHot.y+qHot.h){ showQHint(); if(tripleTap("q")) openCheatConsole(); }
    return; }
  if (state==="play") firing = true; else startOrAdvance(); });
addEventListener("mouseup", () => firing = false);
cv.addEventListener("contextmenu", e => e.preventDefault());
cv.addEventListener("wheel", e => { if (state==="play" && player.weapons.length>1){ e.preventDefault();
  player.weapon = (player.weapon + (e.deltaY>0?1:player.weapons.length-1)) % player.weapons.length; } }, {passive:false});

//============================================================ TOUCH (phone / iPad)
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
const touchMove = {id:null,ox:0,oy:0,kx:0,ky:0,vx:0,vy:0,mag:0,active:false};
const touchAim  = {id:null,ox:0,oy:0,kx:0,ky:0,ang:0,mag:0,active:false};
let uiButtons=[], hudButtons=[];   // rebuilt every frame by the draw fns (touch only)
function tpos(t){ const r=cv.getBoundingClientRect(); return { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) }; }
function hitBtn(list,p){ for(const b of list) if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h) return b; return null; }
function pushBtn(list,x,y,w,h,label,fn){ list.push({x,y,w,h,label,fn}); }
function drawBtn(b){ ctx.fillStyle="rgba(18,28,46,0.9)"; ctx.fillRect(b.x,b.y,b.w,b.h);
  ctx.strokeStyle="#34e7ff"; ctx.lineWidth=2; ctx.strokeRect(b.x,b.y,b.w,b.h);
  ctx.fillStyle="#cfe8ff"; ctx.font="bold 15px Trebuchet MS"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2); ctx.textBaseline="alphabetic"; ctx.textAlign="left"; }
function stickSet(s,p){ const dx=p.x-s.ox, dy=p.y-s.oy, mag=Math.hypot(dx,dy), R=70, D=12; s.mag=mag;
  if(mag>D){ s.vx=dx/mag; s.vy=dy/mag; s.ang=Math.atan2(dy,dx); } else { s.vx=0; s.vy=0; }
  s.kx = s.ox + (mag>R?dx/mag*R:dx); s.ky = s.oy + (mag>R?dy/mag*R:dy); }
function resetSticks(){ touchMove.active=false; touchMove.vx=touchMove.vy=touchMove.mag=0;
  touchAim.active=false; touchAim.mag=0; firing=false; }
function handleTouchStart(id,p){
  if(state==="play"){ const b=hitBtn(hudButtons,p); if(b){ b.fn(); return; }
    if(p.x<W*0.5 && !touchMove.active){ Object.assign(touchMove,{id,ox:p.x,oy:p.y,kx:p.x,ky:p.y,vx:0,vy:0,mag:0,active:true}); }
    else if(p.x>=W*0.5 && !touchAim.active){ Object.assign(touchAim,{id,ox:p.x,oy:p.y,kx:p.x,ky:p.y,ang:player.aim,mag:0,active:true}); }
    return; }
  const b=hitBtn(uiButtons,p); if(b){ b.fn(); return; }
  if(state==="name"){ if(nm) nm.focus(); return; }
  if(state==="help"){ helpAdvance(); return; }
  if(state==="settings") return;   // settings is button-driven (sliders, HELP, secret "?")
  if(["title","story","intro","over","godwin"].includes(state)) startOrAdvance();
}
function handleTouchMove(id,p){ if(id===touchMove.id) stickSet(touchMove,p); if(id===touchAim.id) stickSet(touchAim,p); }
function handleTouchEnd(id){ if(id===touchMove.id){ touchMove.active=false; touchMove.vx=touchMove.vy=touchMove.mag=0; }
  if(id===touchAim.id){ touchAim.active=false; touchAim.mag=0; } }
cv.addEventListener("touchstart", e=>{ e.preventDefault(); audioInit(); for(const t of e.changedTouches) handleTouchStart(t.identifier, tpos(t)); }, {passive:false});
cv.addEventListener("touchmove",  e=>{ e.preventDefault(); for(const t of e.changedTouches) handleTouchMove(t.identifier, tpos(t)); }, {passive:false});
cv.addEventListener("touchend",   e=>{ e.preventDefault(); for(const t of e.changedTouches) handleTouchEnd(t.identifier); }, {passive:false});
cv.addEventListener("touchcancel",e=>{ for(const t of e.changedTouches) handleTouchEnd(t.identifier); }, {passive:false});
// Native keyboard for the name screen on touch devices
const nm = document.getElementById("nm");
let nmShown=false;
if(nm){ nm.addEventListener("input", ()=>{ playerName=nm.value.replace(/[^A-Za-z0-9 _!\-]/g,"").slice(0,14); if(nm.value!==playerName) nm.value=playerName; });
  nm.addEventListener("keydown", e=>{ if(e.key==="Enter") confirmName(); }); }
function confirmName(){ if(playerName.trim()){ playerName=playerName.trim(); localStorage.setItem("hotdogNights.name",playerName); if(playerName.toLowerCase()==="moonk") activateMoonk(); state="charselect"; } }
function syncNameInput(){ if(!isTouch||!nm) return;
  if(state==="name" && !nmShown){ nm.style.display="block"; nm.value=playerName; setTimeout(()=>nm.focus(),0); nmShown=true; }
  else if(state!=="name" && nmShown){ nm.style.display="none"; nm.blur(); nmShown=false; } }
// Cheat-code console (Options: 4+5+6, or triple-tap the secret "?"). Works for keyboard + touch.
const cc = document.getElementById("cc");
function openCheatConsole(){ if(cheatConsoleOpen) return; cheatConsoleOpen=true; numDown={};
  if(cc){ cc.value=""; cc.style.display="block"; setTimeout(()=>cc.focus(),0); } audioInit(); sfx.pop(); }
function closeCheatConsole(){ cheatConsoleOpen=false; if(cc){ cc.style.display="none"; cc.blur(); } }
function submitCheatConsole(){ const code=(cc?cc.value:"").trim().toUpperCase(); closeCheatConsole();
  if(["JUMP","DOCTOR","MINIONS","MOONK"].includes(code)) activateCheat(code.toLowerCase());
  else banner={t:2.0, big:"INVALID CODE", small: code?('"'+code+'"'):"type a real one"}; }
if(cc){ cc.addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.stopPropagation(); e.preventDefault(); submitCheatConsole(); }
  else if(e.key==="Escape"){ e.stopPropagation(); e.preventDefault(); closeCheatConsole(); } }); }
function drawTouchSticks(){ ctx.save(); ctx.lineWidth=3;
  if(touchMove.active){ ctx.strokeStyle="rgba(52,231,255,0.35)"; ctx.beginPath(); ctx.arc(touchMove.ox,touchMove.oy,70,0,7); ctx.stroke();
    ctx.fillStyle="rgba(52,231,255,0.45)"; ctx.beginPath(); ctx.arc(touchMove.kx,touchMove.ky,30,0,7); ctx.fill(); }
  else { ctx.fillStyle="rgba(120,140,170,0.35)"; ctx.font="bold 13px Trebuchet MS"; ctx.textAlign="center"; ctx.fillText("MOVE", W*0.25, H-24); ctx.textAlign="left"; }
  if(touchAim.active){ ctx.strokeStyle="rgba(255,80,80,0.4)"; ctx.beginPath(); ctx.arc(touchAim.ox,touchAim.oy,70,0,7); ctx.stroke();
    ctx.fillStyle="rgba(255,80,80,0.5)"; ctx.beginPath(); ctx.arc(touchAim.kx,touchAim.ky,30,0,7); ctx.fill(); }
  else { ctx.fillStyle="rgba(120,140,170,0.35)"; ctx.font="bold 13px Trebuchet MS"; ctx.textAlign="center"; ctx.fillText("AIM + FIRE", W*0.75, H-24); ctx.textAlign="left"; }
  ctx.restore(); }

//============================================================ AUDIO
let actx=null, master=null, musicGain=null, sfxGain=null, muted=false, noiseBuf=null;
let musicTimer=null, mi=0;
function audioInit(){ if (actx) return; try {
  actx = new (window.AudioContext||window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.4; master.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = 0.5; musicGain.connect(master);
  sfxGain = actx.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(master);
  noiseBuf = actx.createBuffer(1, actx.sampleRate*0.4, actx.sampleRate);
  const d = noiseBuf.getChannelData(0); for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  if (!musicTimer) musicTimer = setInterval(musicTick, 150);
  applySettings();
} catch(e){} }
function beep(freq, dur, type="square", vol=1, slideTo=null){
  if (!actx || muted) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), actx.currentTime+dur);
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g); g.connect(sfxGain); o.start(); o.stop(actx.currentTime+dur);
}
function noise(dur, vol, freq=1000){ if (!actx||muted) return;
  const s=actx.createBufferSource(); s.buffer=noiseBuf;
  const g=actx.createGain(); g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  const f=actx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=freq;
  s.connect(f); f.connect(g); g.connect(sfxGain); s.start(); s.stop(actx.currentTime+dur);
}
function mnote(freq, dur, type, vol){ if (!actx||muted) return;
  const o=actx.createOscillator(), g=actx.createGain(); o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g); g.connect(musicGain); o.start(); o.stop(actx.currentTime+dur);
}
function musicTick(){
  if (!actx || muted || state!=="play") return;
  const enr = boss && boss.enraged;
  const bass=[55,55,65.4,49, 55,55,73.4,82.4];
  mnote(bass[mi%bass.length], 0.16, "triangle", 0.22);
  if (mi%2===0) mnote(40, 0.10, "sine", 0.5);     // kick
  noise(0.02, 0.04, 6500);                         // hat
  if (enr){ if (mi%2===0) mnote([330,392,247][mi%3], 0.10, "square", 0.10); }
  else if (mi%8===6) mnote([196,233][mi%2], 0.12, "square", 0.06);
  mi++;
}
const sfx = {
  pew:   () => beep(880, 0.07, "square", 0.45, 320),
  mg:    () => beep(720, 0.045, "square", 0.30, 480),
  boom:  () => { noise(0.18, 0.5, 1900); beep(95, 0.18, "sawtooth", 0.35, 40); },
  zap:   () => { beep(1300, 0.11, "sawtooth", 0.35, 280); },
  empty: () => beep(180, 0.05, "square", 0.25),
  pickup:() => { beep(523,0.08,"square",0.5); setTimeout(()=>beep(784,0.12,"square",0.5),80); setTimeout(()=>beep(1046,0.14,"square",0.5),180); },
  ammo:  () => beep(660, 0.07, "triangle", 0.45, 880),
  growl: (v=0.5) => { beep(66, 0.34, "sawtooth", v, 42); beep(52, 0.34, "square", v*0.5, 38); },
  splat: () => { noise(0.14, 0.35, 700); beep(160, 0.16, "sawtooth", 0.3, 60); },
  pop:   () => beep(300, 0.06, "square", 0.3, 150),
  hurt:  () => { beep(150, 0.18, "sawtooth", 0.5, 55); noise(0.10, 0.25, 500); },
  bosshit:()=> beep(240, 0.04, "square", 0.18, 200),
  kill:  () => { beep(180,0.25,"sawtooth",0.5,40); setTimeout(()=>beep(120,0.3,"sawtooth",0.5,30),120); [523,659,880].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"square",0.4),200+i*120)); },
  win:   () => [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"square",0.5),i*150)),
  lose:  () => [330,247,165,110].forEach((f,i)=>setTimeout(()=>beep(f,0.35,"sawtooth",0.5,f*0.6),i*200)),
  power: () => { [262,392,523,784,1046,1568].forEach((f,i)=>setTimeout(()=>beep(f,0.16,"square",0.5),i*70)); noise(0.4,0.3,1200); },
};

//============================================================ SPRITES
const PAL = {
  k:"#14141f", h:"#3a2410", s:"#e8b88a", b:"#2e86c1", p:"#34495e",
  o:"#2a0f06", n:"#e0a86b", r:"#c0392b", d:"#8e2a1c", y:"#f4d03f", w:"#ffffff", t:"#fff2cf", l:"#5a2d10",
  c:"#34e7ff", g:"#888", a:"#caa24a", e:"#7a5a18",
};
const SP_PLAYER = ["..kkkk..",".khhhhk.",".kssssk.",".kssssk.",".kbbbbk.","kbbbbbbk","kbbbbbbk",".kbbbbk.",".kp..pk.",".kp..pk.",".kk..kk.","........"];
const SP_HOTDOG = ["...ooooo...","..odrrrdo..",".odrrrrrdo.",".orrrrrrro.","orwwrrrwwro","orworrrowro","orrrrrrrrro","oroooooooro","orotototoro","oroooooooro",".orrrrrrro.",".nnrrrrrnn.",".nnryrrrnn.",".nnrrryrnn.",".nnryrrrnn.",".nnrrrrrnn.","..nnrrrnn..","..ll...ll.."];
const SP_GUN = ["........","..cccc..",".cccccg.","ccccccgg",".cc..ggg",".gg.....",".gg.....","........"];
const SP_CRATE = ["eeeeee","eaaaae","eaeaea","eaeaea","eaaaae","eeeeee"];
// Moonk cheat look: dark skin, black freeform locs crown, drawn over the player when MOONK MODE is on.
const SP_FREEFORMS = ["..h.h.h.h..",".hhhhhhhhh.","hh.hhhhh.hh","h.hhhhhhh.h",".hh.h.h.hh.","h..h.h.h..h","...h...h..."];
const MOONK_OV = { k:"#0a0a0a", h:"#050505", s:"#5a3520", b:"#111827", p:"#07090d" };
// "Pig in a blanket" gremlin: golden blanket (a), pink piggy (s), angry dark eyes (k), little legs (l).
const SP_PIG = ["..aaa..",".aaaaa.","asksksa","asssssa","aa.s.aa",".l...l."];
// PHAT GLIZZY = Frankie's demon spawn. Tints SP_HOTDOG fiery gold.
const GLIZZY_OV = { o:"#2a0f00", d:"#ff5a1e", r:"#ff8c1a", w:"#fff2cf", n:"#f4d03f", y:"#ffffff", t:"#ff3b3b", l:"#7a3a00" };
// Health potion: cyan-glass bottle, red liquid, white "+" cross. Clearly different from the yellow ammo crate.
const SP_POTION = ["..lll..","..lll..",".ccccc.","crrwrrc","crwwwrc","crrwrrc","crrrrrc",".ccccc.","..ccc.."];
// Friendly MINION ("glizzy goon"): a teal-tinted little person summoned by the MINIONS cheat.
const FRIEND_OV = { k:"#062018", b:"#1de9b6", s:"#bfffe9", h:"#0a3a2e", p:"#0a3a2e" };
function drawSprite(grid, cx, cy, scale, flip=1, ov=null){
  const gw=grid[0].length, gh=grid.length, ox=cx-(gw*scale)/2, oy=cy-(gh*scale)/2;
  for (let row=0; row<gh; row++){ const line=grid[row];
    for (let col=0; col<gw; col++){ const ch=line[col]; if (ch===".") continue;
      const color=(ov&&ov[ch])||PAL[ch]; if (!color) continue; ctx.fillStyle=color;
      const dx = flip<0 ? ox+(gw-1-col)*scale : ox+col*scale;
      ctx.fillRect(Math.round(dx), Math.round(oy+row*scale), scale, scale); } }
}
function drawMoonkFreeforms(cx, cy, scale, flip=1){ drawSprite(SP_FREEFORMS, cx, cy-4*scale, scale, flip, MOONK_OV); }
// Cached radial-glow images: building gradients every frame was the main slowdown.
const glowCache = new Map();
function glow(x, y, radius, color){
  const key = color + "|" + radius;
  let c = glowCache.get(key);
  if (!c){ c = document.createElement("canvas"); c.width = c.height = radius*2;
    const g = c.getContext("2d");
    const rg = g.createRadialGradient(radius,radius,0,radius,radius,radius);
    rg.addColorStop(0,color); rg.addColorStop(1,"rgba(0,0,0,0)");
    g.fillStyle = rg; g.fillRect(0,0,radius*2,radius*2); glowCache.set(key,c); }
  ctx.drawImage(c, x-radius, y-radius);
}

const solid = Array.from({length:MH}, () => new Array(MW).fill(false));
function setBlock(x,y,w,h){ for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const ty=y+j,tx=x+i;
  if(ty>=0&&ty<MH&&tx>=0&&tx<MW) solid[ty][tx]=true; } }
function buildMap(){
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) solid[y][x]=false;
  for(let x=0;x<MW;x++){ solid[0][x]=true; solid[MH-1][x]=true; }
  for(let y=0;y<MH;y++){ solid[y][0]=true; solid[y][MW-1]=true; }
  [[10,15,2,2],[18,8,3,1],[25,19,2,3],[34,16,2,2],[8,25,3,1],
   [20,13,1,4],[29,6,2,2],[15,27,2,2],[39,27,1,3],[6,7,2,1],
   [24,11,2,1],[12,21,1,3],[33,12,2,1]].forEach(b=>setBlock(...b));
}

function zoneColorAt(tx,ty){ if(god) return ((tx+ty)&1)?"#1c0608":"#230a0c"; for(const z of ZONES) if(tx>=z.x&&tx<z.x+z.w&&ty>=z.y&&ty<z.y+z.h) return z.col; return "#181826"; }
function tileSolid(tx,ty){ if(tx<0||ty<0||tx>=MW||ty>=MH) return true; return solid[ty][tx]; }
function collides(x,y,r){
  const minx=Math.floor((x-r)/TS),maxx=Math.floor((x+r)/TS),miny=Math.floor((y-r)/TS),maxy=Math.floor((y+r)/TS);
  for(let ty=miny;ty<=maxy;ty++) for(let tx=minx;tx<=maxx;tx++) if(tileSolid(tx,ty)) return true; return false;
}
function moveEntity(e,dx,dy){ if(!collides(e.x+dx,e.y,e.r)) e.x+=dx; if(!collides(e.x,e.y+dy,e.r)) e.y+=dy; }
function freeWorldPoint(){ for(let i=0;i<200;i++){ const tx=1+Math.floor(Math.random()*(MW-2)),ty=1+Math.floor(Math.random()*(MH-2));
  if(!solid[ty][tx]) return {x:tx*TS+TS/2,y:ty*TS+TS/2}; } return {x:WORLD_W/2,y:WORLD_H/2}; }
function farPoint(){ let p; for(let i=0;i<60;i++){ p=freeWorldPoint(); if(Math.hypot(p.x-player.x,p.y-player.y)>380) return p; } return p; }

// JUMP: collision-safe forward dash along the aim. Sweeps in steps and stops before any wall, so it
// never lands inside geometry or outside the map (border tiles are solid). Cooldown-gated.
function doJump(){ if(state!=="play" || player.jumpCd>0) return;
  const dist=160, steps=18, a=player.aim; let gx=player.x, gy=player.y;
  for(let i=1;i<=steps;i++){ const t=i/steps, nx=player.x+Math.cos(a)*dist*t, ny=player.y+Math.sin(a)*dist*t;
    if(collides(nx,ny,player.r)) break; gx=nx; gy=ny; }
  burst(player.x,player.y,14,"#34e7ff",6,0.4,3);     // trail at the takeoff point
  player.x=gx; player.y=gy;
  burst(player.x,player.y,18,"#7fffd4",7,0.45,3); shake=Math.max(shake,0.25); sfx.zap();
  player.jumpCd=1.1;
}
// MINIONS: spawn a small squad of friendly goons. Capped count + spawn cooldown + lifespan despawn.
function spawnMinions(){
  if(minionCd>0){ banner={t:1.6, big:"GOONS RECHARGING", small:"give them a sec"}; return; }
  const MAXF=4, n=Math.min(3, MAXF-friends.length);
  if(n<=0){ banner={t:1.6, big:"SQUAD FULL", small:"4 goons is the limit"}; return; }
  for(let i=0;i<n;i++){ const a=Math.random()*6.28, d=28+Math.random()*22;
    friends.push({x:player.x+Math.cos(a)*d, y:player.y+Math.sin(a)*d, r:9, life:13, fireCd:Math.random()*0.3, aim:0}); }
  minionCd=6; sfx.power(); burst(player.x,player.y,20,"#7fffd4",6,0.5,3);
}
// Nearest live hostile to (x,y) - used by friendly goons to pick a target.
function nearestEnemy(x,y){ let best=null, bd=1e9;
  const consider=e=>{ if(!e||e.dead) return; const d=Math.hypot(e.x-x,e.y-y); if(d<bd){ bd=d; best=e; } };
  consider(boss); consider(glizzler);
  for(const g of glizzies) consider(g);
  for(const pk of packets) if(!pk.dead) consider(pk);
  for(const gm of gremlins) if(!gm.dead) consider(gm);
  return best;
}
// Friendly goons: hover near the player, chase/strafe the nearest enemy, and fire friendly lasers into
// the shared bullet pool (those already damage enemies and never the player). They despawn on a timer.
function updateFriends(dt,f){
  if(minionCd>0) minionCd-=dt;
  for(const fr of friends){ fr.life-=dt; fr.fireCd-=dt;
    const tgt=nearestEnemy(fr.x,fr.y);
    if(tgt){ const a=Math.atan2(tgt.y-fr.y,tgt.x-fr.x), dist=Math.hypot(tgt.x-fr.x,tgt.y-fr.y);
      const want = dist>150?1 : dist<70?-0.7 : 0;                 // hold mid-range
      moveEntity(fr, Math.cos(a)*1.7*want*f, Math.sin(a)*1.7*want*f);
      fr.aim=a;
      if(fr.fireCd<=0){ const aa=a+(Math.random()-0.5)*0.12;
        bullets.push({x:fr.x+Math.cos(aa)*14,y:fr.y+Math.sin(aa)*14,vx:Math.cos(aa)*9,vy:Math.sin(aa)*9,life:0.7,dmg:0.6,pierce:0,color:"#7fffd4"});
        fr.fireCd=0.45; if(Math.random()<0.5) sfx.mg(); }
    }
    const pa=Math.atan2(player.y-fr.y,player.x-fr.x), pd=Math.hypot(player.x-fr.x,player.y-fr.y);  // never stray too far
    if(pd>210) moveEntity(fr, Math.cos(pa)*1.9*f, Math.sin(pa)*1.9*f);
  }
  friends=friends.filter(fr=>fr.life>0);
}

function cfg(n){ const d=curDiff(); const ramp=(n-1)*d.nightScale; return {
  speed: (1.15 + 0.2*ramp)*d.spdMul,
  hp: Math.round((16 + ramp*13)*d.hpMul),
  contact: 14 + 3*ramp,                                   // base hit; dmgMul applied in hurtPlayer()
  packets: n>=2, packetEvery: Math.max(3.2, 6-0.6*ramp)/d.aggroMul, packetBurst: (n>=4?3:2)+(d.aggroMul>=1.3?1:0),
  shoot: n>=3, shootEvery: Math.max(2.2, 4.2-0.55*ramp)/d.aggroMul, shootSpread: n>=5,
  crateEvery: d.crateEvery, potionEvery: d.potionEvery,
}; }

function toggleFullscreen(){ const el=document.documentElement, fs=document.fullscreenElement||document.webkitFullscreenElement;
  if(!fs){ const req=el.requestFullscreen||el.webkitRequestFullscreen; if(req) req.call(el);
    if(screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(()=>{}); }
  else { const ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex) ex.call(document); } }

//============================================================ HELPERS
function burst(x,y,n,color,spd=4,life=0.5,size=3){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=Math.random()*spd;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,color,size}); } }
// All incoming damage funnels through here so difficulty + MOONK resistance always apply. Returns true if the hit was fatal.
function hurtPlayer(amount, hitShake){
  const dmg=Math.max(1, amount*curDiff().dmgMul*(player.resist||1));
  player.hp-=dmg; player.lastHit=nightTime; shake=Math.max(shake,hitShake); sfx.hurt();
  if(player.moonk) burst(player.x,player.y,10,"#34e7ff",5,0.25,2);
  if(player.hp<=0){ player.hp=0; gameOver(); return true; }
  return false;
}
function rand(a,b){ return a+Math.random()*(b-a); }
// Kill-combo: chain kills before the timer lapses to multiply score.
function addKill(base){ combo++; comboT=2.8; comboMul=Math.min(12, 1+Math.floor(combo/3)); score+=Math.round(base*comboMul); }
function resetCombo(){ combo=0; comboT=0; comboMul=1; }
// Pick a free spot at distance [minD,maxD] from the player for a teleport landing.
function teleTarget(minD,maxD){
  for(let i=0;i<80;i++){ const a=Math.random()*6.28, d=minD+Math.random()*(maxD-minD);
    const x=player.x+Math.cos(a)*d, y=player.y+Math.sin(a)*d;
    if(x>50&&x<WORLD_W-50&&y>50&&y<WORLD_H-50 && !collides(x,y,22)) return {x,y}; }
  return {x:Math.max(50,Math.min(WORLD_W-50,player.x+rand(-90,90))), y:Math.max(50,Math.min(WORLD_H-50,player.y+rand(-90,90)))};
}
// Generic teleport-slam: warn (fade + ring at target) -> blink in -> slam AoE. Returns true if it killed the player.
function stepTeleport(e, dt, opt){
  if(e.tpWarn>0){ e.tpWarn-=dt;
    if(e.tpWarn<=0){ e.x=e.tpTarget.x; e.y=e.tpTarget.y; e.flip=player.x<e.x?-1:1;
      burst(e.x,e.y,30,"#b15cff",6,0.55,4); shake=Math.max(shake,0.55); sfx.zap();
      if(Math.hypot(e.x-player.x,e.y-player.y) < e.r+player.r+(opt.slamR||14)){
        if(hurtPlayer(opt.dmg,0.5)) return true;
        const ka=Math.atan2(player.y-e.y,player.x-e.x); moveEntity(player,Math.cos(ka)*26,Math.sin(ka)*26); }
      e.tpT=rand(opt.every[0],opt.every[1]); }
    return false; }
  e.tpT-=dt;
  if(e.tpT<=0){ e.tpTarget=teleTarget(opt.range[0],opt.range[1]); e.tpWarn=opt.warn; }
  return false;
}
function dropGrease(x,y){ if(greasePuddles.length<14) greasePuddles.push({x,y,r:rand(20,28),life:rand(3,4.2),max:4.2}); }
function gameOver(){ state="over"; resetSticks(); sfx.lose(); if(!god && night>best){ best=night; localStorage.setItem("hotdogNights.best",String(best)); } }
function confettiBurst(){ parts=[]; for(let i=0;i<90;i++) parts.push({x:Math.random()*WORLD_W,y:Math.random()*WORLD_H,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:2.4,max:2.4,color:["#ff3b3b","#34e7ff","#f4d03f","#fff"][i%4],size:4}); }
function winGame(){ state="win"; resetSticks(); sfx.win(); if(5>best){ best=5; localStorage.setItem("hotdogNights.best","5"); }
  confettiBurst(); }
function clearNight(){ score+=500; shake=0.6; resetSticks(); sfx.kill();
  burst(boss.x,boss.y,60,"#c0392b",7,1.0,5); burst(boss.x,boss.y,30,"#f4d03f",6,0.9,4);
  if(night>=5) winGame();
  else { player.hp=Math.min(player.maxHp, player.hp+25); startNight(night+1); state="intro"; introTimer=2.8; } }
//============================================================ GOD LEVEL (optional, post-win)
const GOD_BEAT="The walk-in freezer bursts open. FIVE PHAT GLIZZYS roll out - they teleport, spit grease globs, and hurl swarms of PIGS IN A BLANKET. Each one you drop makes the rest angrier. Clear all five... if that's really the end.";
function buildGodMap(){
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) solid[y][x]=false;
  for(let x=0;x<MW;x++){ solid[0][x]=true; solid[MH-1][x]=true; }
  for(let y=0;y<MH;y++){ solid[y][0]=true; solid[y][MW-1]=true; }
  [[8,7,2,2],[34,7,2,2],[8,23,2,2],[34,23,2,2],[21,5,2,2],[21,25,2,2],[5,15,2,2],[37,15,2,2]].forEach(b=>setBlock(...b));
}
function startGodLevel(){
  god=true; night=6; const d=curDiff();
  buildGodMap();
  player.x=22*TS+TS/2; player.y=16*TS+TS/2; player.fireCd=0; player.lastHit=-10; player.newWeapon=null;
  player.armed=true; gun=null;
  if(cheatMoonk) applyMoonkLoadout();
  else { player.ammo=AMMO_MAX; player.hp=player.maxHp; }
  player.weapons=["pistol","smg","shotgun","plasma","pmg"]; player.weapon=4;
  player.newWeapon={name:"PLASMA MINIGUN", key:"5"};
  boss=null; bullets=[]; globs=[]; packets=[]; parts=[]; crates=[]; gremlins=[]; potions=[]; friends=[]; minionCd=0;
  crateTimer=5; potionTimer=d.potionEvery*0.6; nightTime=0; shake=0;
  glizzler=null; greasePuddles=[]; resetCombo();
  glizzies=[];
  const hp=Math.round(95*d.hpMul);
  for(let k=0;k<5;k++){ let pt=freeWorldPoint();
    for(let tries=0;tries<200;tries++){ const c2=freeWorldPoint();
      if(Math.hypot(c2.x-player.x,c2.y-player.y)>260 && glizzies.every(g=>Math.hypot(g.x-c2.x,g.y-c2.y)>150)){ pt=c2; break; } }
    glizzies.push({ x:pt.x, y:pt.y, r:24, hp:hp, maxHP:hp,
      wobble:Math.random()*6, flip:1, spawnT:1.2+Math.random()*1.5, globT:2+Math.random()*3, hitFlash:0, dead:false,
      tpT:rand(5,9), tpWarn:0, tpTarget:null }); }
  state="intro"; introTimer=3.2;
}
// All 5 glizzies down -> the freezer's final form rises.
function spawnGlizzler(){ const d=curDiff(); const hp=Math.round(560*d.hpMul); const p=teleTarget(180,260);
  glizzler={ x:p.x, y:p.y, r:42, hp:hp, maxHP:hp, wobble:0, flip:1, hitFlash:0, dead:false,
    tpT:rand(3.5,5.5), tpWarn:0, tpTarget:null, atkT:rand(1.4,2.4), pigT:rand(1.8,2.8) };
  gremlins=[]; globs=[]; banner={t:2.8, big:"THE BIG GLIZZLER", small:"the freezer's final form. END IT."};
  shake=0.9; sfx.growl(1); }
function godWin(){ state="godwin"; god=false; glizzler=null; resetSticks(); sfx.win(); confettiBurst();
  const won=Math.max(bestGod, diffSel+1); bestGod=won; localStorage.setItem("hotdogNights.god",String(won)); }
function fireGlobs(c,enr){ const base=Math.atan2(player.y-boss.y, player.x-boss.x);
  const angs = c.shootSpread ? [base-0.28,base,base+0.28] : [base]; const spd=3.4*(enr?1.25:1);
  angs.forEach(a=>globs.push({x:boss.x+Math.cos(a)*22,y:boss.y+Math.sin(a)*22,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:2.6,r:9,dmg:12}));
  sfx.splat(); }

//============================================================ UPDATE
function update(dt){
  const f=dt*60;
  player.fireCd=Math.max(0,player.fireCd-dt); shake=Math.max(0,shake-dt);
  if(player.jumpCd>0) player.jumpCd-=dt;
  if(touchAim.active){ player.aim=touchAim.ang;        // touch: right stick aims (and fires)
    aimPt.x=(player.x-camX)+Math.cos(player.aim)*130; aimPt.y=(player.y-camY)+Math.sin(player.aim)*130; }
  else if(!isTouch){ const t=Math.min(1, aimLerp*f);    // mouse: crosshair eases toward cursor (sensitivity)
    aimPt.x += (mouseX-aimPt.x)*t; aimPt.y += (mouseY-aimPt.y)*t;
    const mwx=aimPt.x+camX, mwy=aimPt.y+camY; player.aim=Math.atan2(mwy-player.y, mwx-player.x); }
  if(Math.cos(player.aim)!==0) player.flip=Math.cos(player.aim)<0?-1:1;

  // movement
  let dx=0,dy=0;
  if(touchMove.active && touchMove.mag>12){ dx=touchMove.vx; dy=touchMove.vy; }   // touch: left stick moves
  else { if(keys["w"]||keys["arrowup"]) dy-=1; if(keys["s"]||keys["arrowdown"]) dy+=1;
    if(keys["a"]||keys["arrowleft"]) dx-=1; if(keys["d"]||keys["arrowright"]) dx+=1; }
  if(dx||dy){ const m=Math.hypot(dx,dy), sp=SPEED*player.speedMul*f; moveEntity(player,dx/m*sp,dy/m*sp); }
  if(player.regen && player.hp<player.maxHp) player.hp=Math.min(player.maxHp, player.hp+player.regen*dt);

  // gun pickup
  if(gun){ gun.t+=dt; if(Math.hypot(gun.x-player.x,gun.y-player.y)<28){
    player.armed=true; gun=null; sfx.pickup();
    if(player.startAllWeapons){ unlockAllWeapons("MOONK MODE"); player.ammo=MOONK.ammoMax; }
    else { player.weapons=["pistol"]; player.weapon=0; player.ammo=START_AMMO+player.ammoBonus; }
    burst(player.x,player.y,player.moonk?46:24,player.moonk?"#f4d03f":"#34e7ff",7,0.6,3); } }

  // shooting
  const wpn = player.armed ? WEAPONS[player.weapons[player.weapon]] : null;
  const touchShoot = touchAim.active && touchAim.mag>14;
  if((firing||keys[" "]||touchShoot) && wpn && player.fireCd<=0){
    const cost=player.ammoInfinite?0:wpn.cost;
    if(player.ammo>=cost){ if(!player.ammoInfinite) player.ammo-=cost; player.fireCd=wpn.cd*player.fireMul;
      for(let i=0;i<wpn.pellets;i++){ const a=player.aim+(Math.random()-0.5)*wpn.spread;
        bullets.push({x:player.x+Math.cos(a)*16,y:player.y+Math.sin(a)*16,vx:Math.cos(a)*wpn.speed,vy:Math.sin(a)*wpn.speed,life:player.moonk?1.05:0.7,dmg:wpn.dmg*player.damageMul,pierce:wpn.pierce+(player.moonk?2:0),color:player.moonk?"#f4d03f":wpn.color}); }
      burst(player.x+Math.cos(player.aim)*18, player.y+Math.sin(player.aim)*18, player.moonk?9:3, player.moonk?"#34e7ff":"#fff7b0", player.moonk?6:3, 0.1, 2);
      sfx[wpn.sound]();
    } else { player.fireCd=0.25; sfx.empty(); }
  }
  if(player.ammoInfinite) player.ammo=MOONK.ammoMax;
  player.gatSpin=(player.gatSpin||0)+((firing||keys[" "]||touchShoot)?dt*26:dt*5);

  // bullets (check collisions BEFORE advancing so point-blank shots still register)
  for(const b of bullets){ b.life-=dt;
    if(collides(b.x,b.y,2)){ b.life=0; burst(b.x,b.y,4,"#9fefff",3,0.2,2); continue; }
    if(boss&&!boss.dead && Math.hypot(boss.x-b.x,boss.y-b.y)<boss.r){
      boss.hp-=b.dmg; boss.hitFlash=0.09; sfx.bosshit(); burst(b.x,b.y,4,"#fff",3,0.2,2);
      if(b.pierce>0) b.pierce--; else b.life=0;
      if(boss.hp<=0 && !boss.dead){ boss.dead=true; clearNight(); return; } }
    if(b.life<=0) continue;
    if(god){
      if(glizzler && !glizzler.dead && Math.hypot(glizzler.x-b.x,glizzler.y-b.y)<glizzler.r){
        glizzler.hp-=b.dmg; glizzler.hitFlash=0.09; sfx.bosshit(); burst(b.x,b.y,4,"#fff",3,0.2,2);
        if(glizzler.hp<=0){ glizzler.dead=true; shake=1.0; sfx.kill(); addKill(3000);
          burst(glizzler.x,glizzler.y,90,"#ff7b00",8,1.2,6); burst(glizzler.x,glizzler.y,40,"#f4d03f",7,1.0,5); godWin(); return; }
        if(b.pierce>0) b.pierce--; else b.life=0; }
      if(b.life<=0) continue;
      for(const gz of glizzies){ if(gz.dead) continue;
      if(Math.hypot(gz.x-b.x,gz.y-b.y)<gz.r){ gz.hp-=b.dmg; gz.hitFlash=0.09; sfx.bosshit(); burst(b.x,b.y,4,"#fff",3,0.2,2);
        if(gz.hp<=0){ gz.dead=true; shake=0.5; sfx.kill(); addKill(750);
          burst(gz.x,gz.y,50,"#ff7b00",7,0.9,5); burst(gz.x,gz.y,24,"#f4d03f",6,0.8,4);
          if(glizzies.every(g=>g.dead)){ spawnGlizzler(); return; } }
        if(b.pierce>0) b.pierce--; else b.life=0; break; } }
      if(b.life<=0) continue;
      for(const gm of gremlins){ if(gm.dead) continue;
        if(Math.hypot(gm.x-b.x,gm.y-b.y)<gm.r+2){ gm.dead=true; addKill(20); burst(gm.x,gm.y,8,"#f4d03f",4,0.3,2); sfx.pop();
          if(b.pierce>0) b.pierce--; else b.life=0; break; } }
    }
    if(b.life<=0) continue;
    for(const pk of packets){ if(pk.dead) continue;
      if(Math.hypot(pk.x-b.x,pk.y-b.y)<pk.r+2){ pk.dead=true; addKill(15); burst(pk.x,pk.y,8,"#c0392b",4,0.3,2); sfx.pop();
        if(b.pierce>0) b.pierce--; else b.life=0; break; } }
    if(b.life>0){ b.x+=b.vx*f; b.y+=b.vy*f; }
  }
  bullets=bullets.filter(b=>b.life>0);

  // boss
  if(!god && boss && !boss.dead){
    const c=cfg(night); const d=curDiff(); const demon=diffSel===2; boss.hitFlash=Math.max(0,boss.hitFlash-dt); boss.wobble+=dt*8;
    if(nightTime>=NIGHT_LEN && !boss.enraged){ boss.enraged=true; sfx.growl(1); shake=0.4; }
    const enr=boss.enraged;
    boss.growlT-=dt;
    if(boss.growlT<=0){ const d=Math.hypot(boss.x-player.x,boss.y-player.y);
      const v=Math.max(0.12,0.7*(1-d/460)); sfx.growl(enr?Math.min(1,v+0.2):v); boss.growlT=(enr?1.0:1.7)+Math.random(); }
    // teleport-slam: starts on difficulty.teleFromNight (Baby never, Regular N3, Demon N1). teleRateMul
    // stretches/compresses the cadence. Fair purple-ring telegraph, then a blink-in slam.
    if(night >= d.teleFromNight){ const m=(enr?0.7:1)*d.teleRateMul,
      lo=Math.max(2.6,(demon?4:5.5)-0.3*(night-3))*m, hi=Math.max(4.2,(demon?6.5:9)-0.4*(night-3))*m;
      if(stepTeleport(boss,dt,{every:[lo,hi],warn:0.85,range:[70,150],dmg:Math.min(34,c.contact*1.3),slamR:16})) return; }
    if(boss.tpWarn<=0){
      const ang=Math.atan2(player.y-boss.y, player.x-boss.x);
      const sp=c.speed*(enr?1.3:1)*(boss.tele>0?0.3:1)*f, bob=Math.sin(boss.wobble)*0.4*f;
      boss.flip=Math.cos(ang)<0?-1:1;
      moveEntity(boss, Math.cos(ang)*sp, Math.sin(ang)*sp+bob);
      if(Math.hypot(boss.x-player.x,boss.y-player.y)<boss.r+player.r){
        if(nightTime-player.lastHit>0.8){ if(hurtPlayer(c.contact,0.4)) return;
          burst(player.x,player.y,10,"#ff2d2d",4,0.4,3);
          const ka=Math.atan2(player.y-boss.y,player.x-boss.x); moveEntity(player,Math.cos(ka)*24,Math.sin(ka)*24); } }
      if(c.packets){ boss.atkP-=dt; if(boss.atkP<=0){ const n=c.packetBurst+(enr?1:0);   // demon burst folded into cfg
        for(let i=0;i<n && packets.length<14;i++){ const a=Math.random()*6.28, off=24+Math.random()*16;
          packets.push({x:boss.x+Math.cos(a)*off,y:boss.y+Math.sin(a)*off,r:9,dead:false,wob:Math.random()*6}); }
        sfx.pop(); boss.atkP=c.packetEvery*(enr?0.6:1); } }
      if(c.shoot){ if(boss.tele>0){ boss.tele-=dt; if(boss.tele<=0){ fireGlobs(c,enr); boss.atkS=c.shootEvery*(enr?0.6:1); } }
        else { boss.atkS-=dt; if(boss.atkS<=0) boss.tele=0.6; } }
    }
  }

  // ketchup globs
  for(const g of globs){ g.x+=g.vx*f; g.y+=g.vy*f; g.life-=dt;
    if(collides(g.x,g.y,3)){ g.life=0; burst(g.x,g.y,8,"#b01818",3,0.4,3); continue; }
    if(Math.hypot(g.x-player.x,g.y-player.y)<player.r+g.r){ g.life=0; if(hurtPlayer(g.dmg,0.3)) return;
      burst(player.x,player.y,12,"#c0392b",4,0.5,3); } }
  globs=globs.filter(g=>g.life>0);

  // packet minions
  for(const pk of packets){ if(pk.dead) continue; pk.wob+=dt*10;
    const a=Math.atan2(player.y-pk.y,player.x-pk.x), sp=1.25*(boss&&boss.enraged?1.3:1)*f;
    moveEntity(pk, Math.cos(a)*sp, Math.sin(a)*sp);
    if(Math.hypot(pk.x-player.x,pk.y-player.y)<player.r+pk.r){ pk.dead=true; sfx.pop(); if(hurtPlayer(8,0.2)) return;
      burst(player.x,player.y,8,"#c0392b",3,0.4,2); } }
  packets=packets.filter(p=>!p.dead);

  // GOD LEVEL: PHAT GLIZZYS + pig-in-a-blanket gremlins
  if(god){ if(updateGod(dt,f)) return; }

  // ammo crates (respawn cadence is difficulty-driven)
  if(player.armed){ crateTimer-=dt; if(crateTimer<=0 && crates.length<2){ const p=freeWorldPoint(); crates.push({x:p.x,y:p.y}); crateTimer=cfg(night).crateEvery; }
    for(let i=crates.length-1;i>=0;i--){ const cr=crates[i];
      if(Math.hypot(cr.x-player.x,cr.y-player.y)<26){ player.ammo=Math.min(AMMO_MAX,player.ammo+CRATE_AMMO); crates.splice(i,1); sfx.ammo(); burst(player.x,player.y,12,"#f4d03f",4,0.4,3); } } }

  // health potions - spawn like ammo, frequency by difficulty (Baby common, Demon rare). Caps at maxHp (no overheal).
  potionTimer-=dt; if(potionTimer<=0 && potions.length<2){ const p=freeWorldPoint(); potions.push({x:p.x,y:p.y}); potionTimer=cfg(night).potionEvery; }
  for(let i=potions.length-1;i>=0;i--){ const po=potions[i];
    if(Math.hypot(po.x-player.x,po.y-player.y)<26){ player.hp=Math.min(player.maxHp, player.hp+POTION_HEAL); potions.splice(i,1); sfx.pickup(); burst(player.x,player.y,16,"#ff5c7a",4,0.5,3); } }

  // friendly goons (MINIONS cheat) - works in both normal nights and the god level
  if(friends.length || minionCd>0) updateFriends(dt,f);

  // particles + clock + combo decay
  for(const p of parts){ p.x+=p.vx*f; p.y+=p.vy*f; p.vx*=0.92; p.vy*=0.92; p.life-=dt; }
  parts=parts.filter(p=>p.life>0);
  if(comboT>0){ comboT-=dt; if(comboT<=0) resetCombo(); }
  nightTime+=dt;
}
// Returns true if a fatal hit ended the run (caller must early-return).
function updateGod(dt,f){
  const d=curDiff();
  const aliveN=glizzies.filter(g=>!g.dead).length;
  const rage=1+(5-aliveN)*0.16;   // survivors get angrier as their siblings fall
  for(const gz of glizzies){ if(gz.dead) continue; gz.hitFlash=Math.max(0,gz.hitFlash-dt); gz.wobble+=dt*7;
    if(stepTeleport(gz,dt,{every:[6,10],warn:1.0,range:[80,170],dmg:18,slamR:16})) return true;
    if(gz.tpWarn>0) continue;
    const ang=Math.atan2(player.y-gz.y, player.x-gz.x), sp=0.85*d.spdMul*rage*f, bob=Math.sin(gz.wobble)*0.4*f;
    gz.flip=Math.cos(ang)<0?-1:1; moveEntity(gz, Math.cos(ang)*sp, Math.sin(ang)*sp+bob);
    if(Math.hypot(gz.x-player.x,gz.y-player.y)<gz.r+player.r){
      if(nightTime-player.lastHit>0.8){ if(hurtPlayer(16,0.45)) return true;
        burst(player.x,player.y,10,"#ff7b00",4,0.4,3);
        const ka=Math.atan2(player.y-gz.y,player.x-gz.x); moveEntity(player,Math.cos(ka)*22,Math.sin(ka)*22); } }
    gz.spawnT-=dt; if(gz.spawnT<=0 && gremlins.length<40){ const n=2+(Math.random()<0.6?1:0);
      for(let i=0;i<n;i++){ const a=Math.random()*6.28, dd=20+Math.random()*14;
        gremlins.push({x:gz.x+Math.cos(a)*dd,y:gz.y+Math.sin(a)*dd,r:8,dead:false,wob:Math.random()*6}); }
      sfx.pop(); gz.spawnT=(1.6+Math.random()*1.4)/rage; }
    gz.globT-=dt; if(gz.globT<=0){ const base=Math.atan2(player.y-gz.y,player.x-gz.x), spd=3.6*rage;
      const spread=aliveN<=3?[-0.22,0,0.22]:[0];
      spread.forEach(o=>{ const a=base+o; globs.push({x:gz.x+Math.cos(a)*22,y:gz.y+Math.sin(a)*22,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:2.6,r:9,dmg:12}); });
      sfx.splat(); gz.globT=(2.6+Math.random()*2.5)/rage; } }
  // THE BIG GLIZZLER - final form
  if(glizzler && !glizzler.dead){ const gl=glizzler; gl.hitFlash=Math.max(0,gl.hitFlash-dt); gl.wobble+=dt*6;
    if(stepTeleport(gl,dt,{every:[3.5,5.5],warn:0.9,range:[90,170],dmg:26,slamR:22})) return true;
    if(gl.tpWarn<=0){
      const ang=Math.atan2(player.y-gl.y,player.x-gl.x), sp=1.05*d.spdMul*f, bob=Math.sin(gl.wobble)*0.4*f;
      gl.flip=Math.cos(ang)<0?-1:1; moveEntity(gl, Math.cos(ang)*sp, Math.sin(ang)*sp+bob);
      if(Math.hypot(gl.x-player.x,gl.y-player.y)<gl.r+player.r){ if(nightTime-player.lastHit>0.7){ if(hurtPlayer(24,0.55)) return true;
        burst(player.x,player.y,12,"#ff7b00",4,0.5,3); const ka=Math.atan2(player.y-gl.y,player.x-gl.x); moveEntity(player,Math.cos(ka)*28,Math.sin(ka)*28); } }
      gl.atkT-=dt; if(gl.atkT<=0){ const base=Math.atan2(player.y-gl.y,player.x-gl.x), N=10, spd=3.4;
        for(let i=0;i<N;i++){ const a=base+i*(6.283/N); globs.push({x:gl.x+Math.cos(a)*32,y:gl.y+Math.sin(a)*32,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:3,r:9,dmg:13}); }
        sfx.splat(); dropGrease(gl.x,gl.y); gl.atkT=rand(2.6,3.6); }
      gl.pigT-=dt; if(gl.pigT<=0 && gremlins.length<46){ for(let i=0;i<4;i++){ const a=Math.random()*6.28, dd=26+Math.random()*18;
        gremlins.push({x:gl.x+Math.cos(a)*dd,y:gl.y+Math.sin(a)*dd,r:8,dead:false,wob:Math.random()*6}); } sfx.pop(); gl.pigT=rand(2.2,3.2); } } }
  // pigs in a blanket - faster, lunge when close
  for(const gm of gremlins){ if(gm.dead) continue; gm.wob+=dt*14;
    const dxp=player.x-gm.x, dyp=player.y-gm.y, dist=Math.hypot(dxp,dyp), lunge=dist<100?1.55:1;
    const a=Math.atan2(dyp,dxp), sp=3.1*d.spdMul*lunge*f;
    moveEntity(gm, Math.cos(a)*sp, Math.sin(a)*sp);
    if(dist<player.r+gm.r){ gm.dead=true; sfx.pop(); if(hurtPlayer(9,0.22)) return true;
      burst(player.x,player.y,8,"#f4d03f",3,0.4,2); } }
  gremlins=gremlins.filter(g=>!g.dead);
  // grease puddles - lingering damage-over-time
  for(const gp of greasePuddles){ gp.life-=dt;
    if(Math.hypot(gp.x-player.x,gp.y-player.y)<gp.r+player.r){ player.hp-=7*d.dmgMul*(player.resist||1)*dt; player.lastHit=nightTime;
      if(Math.random()<0.25) burst(player.x,player.y,2,"#6a4a00",2,0.3,2);
      if(player.hp<=0){ player.hp=0; gameOver(); return true; } } }
  greasePuddles=greasePuddles.filter(g=>g.life>0);
  return false;
}

//============================================================ CAMERA
let camX=0, camY=0;
function updateCamera(){ let sx=0,sy=0; if(shake>0&&shakeMul){ sx=(Math.random()-0.5)*shake*30*shakeMul; sy=(Math.random()-0.5)*shake*30*shakeMul; }
  camX=Math.max(0,Math.min(WORLD_W-W,player.x-W/2))+sx; camY=Math.max(0,Math.min(WORLD_H-H,player.y-H/2))+sy; }

//============================================================ RENDER
// Gatling/minigun muzzle: a housing + 3 barrels that spin while firing, drawn along the aim.
function drawGatling(bx,by,a,wpn,spin){
  const ca=Math.cos(a), sa=Math.sin(a), px=-sa, py=ca;
  const baseX=bx+ca*9, baseY=by+sa*9, muzX=bx+ca*27, muzY=by+sa*27;
  ctx.lineCap="round";
  ctx.strokeStyle="#5c5c70"; ctx.lineWidth=9; ctx.beginPath(); ctx.moveTo(baseX,baseY); ctx.lineTo(muzX,muzY); ctx.stroke();
  ctx.strokeStyle="#3a3a48"; ctx.lineWidth=10; ctx.beginPath(); ctx.moveTo(baseX-ca*2,baseY-sa*2); ctx.lineTo(baseX+ca*1,baseY+sa*1); ctx.stroke();
  for(let i=0;i<3;i++){ const ph=spin+i*(6.2832/3), off=Math.sin(ph)*4.2, front=Math.cos(ph)>=0;
    const ox=px*off, oy=py*off;
    ctx.strokeStyle=front?wpn.color:"#2c2c3a"; ctx.lineWidth=front?3:2.4;
    ctx.beginPath(); ctx.moveTo(baseX+ox,baseY+oy); ctx.lineTo(muzX+ox,muzY+oy); ctx.stroke(); }
  ctx.fillStyle="#9a9aae"; ctx.beginPath(); ctx.arc(baseX,baseY,5,0,7); ctx.fill();
  ctx.fillStyle=wpn.color; ctx.beginPath(); ctx.arc(muzX,muzY,3,0,7); ctx.fill();
}
function teleWarnRing(e){ if(!e||e.tpWarn<=0||!e.tpTarget) return; const x=e.tpTarget.x-camX,y=e.tpTarget.y-camY, p=1-Math.max(0,Math.min(1,e.tpWarn));
  ctx.save(); ctx.globalCompositeOperation="lighter"; glow(x,y,40,"rgba(177,92,255,0.45)");
  ctx.strokeStyle="rgba(205,130,255,0.9)"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(x,y,10+p*32,0,7); ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,0.45)"; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(x,y,34,0,7); ctx.stroke(); ctx.restore(); }
function render(){
  ctx.fillStyle="#05050b"; ctx.fillRect(0,0,W,H); updateCamera();
  const tx0=Math.floor(camX/TS),ty0=Math.floor(camY/TS),tx1=Math.ceil((camX+W)/TS),ty1=Math.ceil((camY+H)/TS);
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++){ const sx=tx*TS-camX, sy=ty*TS-camY;
    if(tileSolid(tx,ty)){
      ctx.fillStyle="#4a4a68"; ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle="#74749c"; ctx.fillRect(sx,sy,TS,6);
      ctx.fillStyle="#5c5c82"; ctx.fillRect(sx,sy,6,TS);
      ctx.fillStyle="#23233a"; ctx.fillRect(sx,sy+TS-6,TS,6);
      ctx.fillStyle="#1a1a28"; ctx.fillRect(sx+TS-4,sy,4,TS);
    } else { ctx.fillStyle=zoneColorAt(tx,ty); ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.fillRect(sx+2,sy+2,TS-4,TS-4); }
  }
  ctx.font="bold 13px Trebuchet MS"; ctx.textAlign="center";
  if(!god) for(const z of ZONES){ const lx=(z.x+z.w/2)*TS-camX, ly=z.y*TS-camY+16;
    if(lx>-80&&lx<W+80&&ly>-20&&ly<H+20){ ctx.fillStyle=z.lab; ctx.globalAlpha=0.55; ctx.fillText(z.name,lx,ly); ctx.globalAlpha=1; } }

  for(const gp of greasePuddles){ const x=gp.x-camX, y=gp.y-camY, a=Math.min(0.55, gp.life/gp.max*0.55);
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle="#160c00"; ctx.beginPath(); ctx.ellipse(x,y,gp.r,gp.r*0.62,0,0,7); ctx.fill();
    ctx.fillStyle="#3a2800"; ctx.beginPath(); ctx.ellipse(x,y,gp.r*0.66,gp.r*0.4,0,0,7); ctx.fill(); ctx.restore(); }
  for(const cr of crates) drawSprite(SP_CRATE, cr.x-camX, cr.y-camY, 4);
  for(const po of potions){ const bob=Math.sin(performance.now()/300+po.x)*2; drawSprite(SP_POTION, po.x-camX, po.y-camY-bob, 4); }
  if(gun){ const bob=Math.sin(gun.t*4)*4; drawSprite(SP_GUN, gun.x-camX, gun.y-camY-bob, 4); }

  // packets
  for(const pk of packets){ if(pk.dead) continue; const x=pk.x-camX, y=pk.y-camY+Math.sin(pk.wob)*2;
    ctx.fillStyle="#7a1010"; ctx.fillRect(x-7,y-6,14,12);
    ctx.fillStyle="#c0392b"; ctx.fillRect(x-6,y-5,12,10);
    ctx.fillStyle="#fff"; ctx.fillRect(x-5,y-4,10,3); }
  // globs
  for(const g of globs){ const x=g.x-camX,y=g.y-camY;
    ctx.fillStyle="#7a1010"; ctx.beginPath(); ctx.arc(x,y,g.r,0,7); ctx.fill();
    ctx.fillStyle="#c0392b"; ctx.beginPath(); ctx.arc(x,y,g.r-2,0,7); ctx.fill(); }

  // boss
  if(boss && !boss.dead){ const bx=boss.x-camX, by=boss.y-camY;
    ctx.save(); if(boss.tpWarn>0) ctx.globalAlpha=0.3; drawSprite(SP_HOTDOG, bx, by, BS, boss.flip); ctx.restore();
    if(boss.hitFlash>0){ ctx.save(); ctx.globalAlpha=Math.min(1,boss.hitFlash*6); ctx.fillStyle="#fff"; ctx.fillRect(bx-22,by-36,44,72); ctx.restore(); }
    teleWarnRing(boss); }

  // PHAT GLIZZYS + pigs in a blanket + the BIG GLIZZLER
  if(god){
    for(const gm of gremlins){ if(gm.dead) continue; drawSprite(SP_PIG, gm.x-camX, gm.y-camY+Math.sin(gm.wob)*2, 3, 1); }
    for(const gz of glizzies){ if(gz.dead) continue; const gx=gz.x-camX, gy=gz.y-camY;
      ctx.save(); if(gz.tpWarn>0) ctx.globalAlpha=0.3; drawSprite(SP_HOTDOG, gx, gy, BS+1, gz.flip, GLIZZY_OV); ctx.restore();
      if(gz.hitFlash>0){ ctx.save(); ctx.globalAlpha=Math.min(1,gz.hitFlash*6); ctx.fillStyle="#fff"; ctx.fillRect(gx-26,gy-44,52,84); ctx.restore(); }
      teleWarnRing(gz); }
    if(glizzler && !glizzler.dead){ const gx=glizzler.x-camX, gy=glizzler.y-camY;
      ctx.save(); if(glizzler.tpWarn>0) ctx.globalAlpha=0.32; drawSprite(SP_HOTDOG, gx, gy, BS+3, glizzler.flip, GLIZZY_OV); ctx.restore();
      if(glizzler.hitFlash>0){ ctx.save(); ctx.globalAlpha=Math.min(1,glizzler.hitFlash*6); ctx.fillStyle="#fff"; ctx.fillRect(gx-40,gy-70,80,132); ctx.restore(); }
      teleWarnRing(glizzler); }
  }

  // friendly goons (MINIONS cheat) - little teal fighters; flicker as they're about to despawn
  for(const fr of friends){ if(fr.life<2 && Math.floor(performance.now()/120)%2) continue;
    drawSprite(SP_PLAYER, fr.x-camX, fr.y-camY, 2.4, (fr.aim&&Math.cos(fr.aim)<0)?-1:1, FRIEND_OV); }

  // player
  const pov = cheatMoonk ? MOONK_OV : CHARS[charSel];
  if(cheatMoonk){ const px=player.x-camX, py=player.y-camY;
    ctx.save(); ctx.globalCompositeOperation="lighter";
    glow(px, py, 58, "rgba(52,231,255,0.34)"); glow(px, py, 34, "rgba(244,208,63,0.28)");
    ctx.strokeStyle="rgba(244,208,63,0.72)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(px,py,24+Math.sin(performance.now()/90)*3,0,7); ctx.stroke(); ctx.restore(); }
  drawSprite(SP_PLAYER, player.x-camX, player.y-camY, 3, player.flip, pov);
  if(cheatMoonk) drawMoonkFreeforms(player.x-camX, player.y-camY, 3, player.flip);
  if(player.armed){ const a=player.aim, bx=player.x-camX, by=player.y-camY;
    const wpn=WEAPONS[player.weapons[player.weapon]];
    if(wpn.gatling){ drawGatling(bx,by,a,wpn,player.gatSpin||0); }
    else { ctx.strokeStyle="#9a9aae"; ctx.lineWidth=4; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(a)*20,by+Math.sin(a)*20); ctx.stroke();
      ctx.strokeStyle=wpn.color; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(a)*22,by+Math.sin(a)*22); ctx.stroke(); } }

  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size); }
  ctx.globalAlpha=1;

  drawLighting();

  // EMISSIVE
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++){ if(!tileSolid(tx,ty)) continue; const sx=tx*TS-camX, sy=ty*TS-camY;
    ctx.fillStyle="rgba(86,96,150,0.16)"; ctx.fillRect(sx,sy,TS,TS);
    if(!tileSolid(tx,ty-1)){ ctx.fillStyle="rgba(150,180,255,0.42)"; ctx.fillRect(sx,sy,TS,2); } }
  if(boss && !boss.dead){ const bx=boss.x-camX, by=boss.y-camY, ey=by-BS*4;
    const r=boss.tele>0?66:54, col=boss.tele>0?"rgba(255,150,40,0.5)":(boss.enraged?"rgba(255,50,50,0.5)":"rgba(180,30,30,0.5)");
    glow(bx,by-10,r,col); glow(bx,ey,26,"rgba(255,40,40,0.6)");
    ctx.fillStyle="#ff2a2a"; ctx.fillRect(bx-13,ey-2,6,6); ctx.fillRect(bx+7,ey-2,6,6); }
  for(const g of globs) glow(g.x-camX, g.y-camY, 18, "rgba(255,40,40,0.7)");
  for(const pk of packets){ if(!pk.dead) glow(pk.x-camX, pk.y-camY, 16, "rgba(210,50,50,0.4)"); }
  if(god){ for(const gp of greasePuddles) glow(gp.x-camX, gp.y-camY, 22, "rgba(120,80,10,0.30)");
    for(const gz of glizzies){ if(gz.dead) continue; const gx=gz.x-camX, gy=gz.y-camY;
      glow(gx,gy-10,64,"rgba(255,140,30,0.5)"); glow(gx,gy-BS*4,26,"rgba(255,80,20,0.6)");
      ctx.fillStyle="#fff2cf"; ctx.fillRect(gx-14,gy-BS*4-2,6,6); ctx.fillRect(gx+8,gy-BS*4-2,6,6); }
    for(const gm of gremlins){ if(!gm.dead) glow(gm.x-camX, gm.y-camY, 15, "rgba(244,180,40,0.45)"); }
    if(glizzler && !glizzler.dead){ const gx=glizzler.x-camX, gy=glizzler.y-camY;
      glow(gx,gy-10,96,"rgba(255,120,20,0.55)"); glow(gx,gy-BS*5,34,"rgba(255,60,10,0.7)");
      ctx.fillStyle="#fff2cf"; ctx.fillRect(gx-18,gy-BS*5-2,8,8); ctx.fillRect(gx+10,gy-BS*5-2,8,8); } }
  if(gun) glow(gun.x-camX, gun.y-camY, 60, "rgba(52,231,255,0.55)");
  for(const cr of crates) glow(cr.x-camX, cr.y-camY, 30, "rgba(244,208,63,0.5)");
  for(const po of potions) glow(po.x-camX, po.y-camY, 28, "rgba(255,80,110,0.55)");
  for(const fr of friends) glow(fr.x-camX, fr.y-camY, 22, "rgba(45,233,182,0.45)");
  for(const b of bullets){ const bx=b.x-camX,by=b.y-camY; ctx.fillStyle="#fff"; ctx.fillRect(bx-2,by-2,4,4); glow(bx,by,10,b.color); }
  ctx.restore();

  if(state==="play"||state==="pause") drawReticle();
  cv.style.cursor = (state==="play"||state==="pause") ? "none" : "default";
  drawHUD();
  if(isTouch && state==="play") drawTouchSticks();
  if(state==="title") drawTitle();
  if(state==="name") drawName();
  if(state==="charselect") drawCharSelect();
  if(state==="difficulty") drawDifficulty();
  if(state==="settings") drawSettings();
  if(state==="story") drawStory();
  if(state==="intro") drawIntro();
  if(state==="pause") drawPause();
  if(state==="over") drawOver();
  if(state==="win") drawWin();
  if(state==="godwin") drawGodWin();
  if(state==="help") drawHelp();
  if(banner) drawBanner();
}
// HOW-TO-PLAY content, split into short labelled sections across a few pages. Controls adapt to input type.
function helpPages(){
  const controls = isTouch ? [
    "Move: left on-screen stick.",
    "Aim + Fire: right stick - drag to aim, hold to shoot.",
    "Weapons: tap the slots in the HUD. Pause/Options: the II button." ] : [
    "Move: W A S D or Arrow keys.   Aim: mouse.",
    "Fire: click or Spacebar (hold for the miniguns).",
    "Weapons: 1-5.   Pause: P.   Options: O.   Mute: M.   Fullscreen: F." ];
  return [
    [ ["OBJECTIVE", ["Survive 5 nights at Xtreme Action Park. Each night runs 12 AM to 6 AM - outlast the clock to reach the next one.",
                     "Make it through Night 5 to put Frankie down for good."]],
      ["CONTROLS", controls] ],
    [ ["ENEMIES", ["FRANKIE THE HOTDOG hunts you all night - faster and angrier each night, and he ENRAGES once 6 AM passes.",
                   "From Night 3 (Night 1 on Demon) he TELEPORTS: a purple ring shows where he'll slam down, so move.",
                   "He also throws crawling ketchup packets and spits ketchup globs - shoot them down or dodge."]] ],
    [ ["PICKUPS", ["Yellow crates refill ammo. Red potions restore health. Up to 2 of each are on the map and they respawn over time - grab them between fights."]],
      ["HEALTH", ["You start at 100 HP. Frankie, packets, and globs all hurt you - how much depends on difficulty.",
                  "HP does not regenerate on its own: grab potions, and surviving a night heals you a little."]] ],
    [ ["DIFFICULTY MODES", ["BABY: slow, weak Frankie and tons of potions - he never really teleports.",
                            "REGULAR: the intended fight, tense but fair. Teleport slams start Night 3.",
                            "DEMON ('Do you hate yourself?'): teleports from Night 1, hits hard, potions are scarce."]],
      ["SURVIVAL TIPS", ["Keep moving - a stationary target is ketchup. Watch for the purple ring and bail before the slam.",
                         "Rush the LASER TAG ARENA on Night 1 to grab the gun. Grab potions as you pass; don't hoard."]] ],
  ];
}
function drawHelp(){ dim(); ctx.textAlign="center"; uiButtons.length=0;
  const pages=helpPages(), pg=pages[Math.min(helpPage,pages.length-1)];
  ctx.fillStyle="#34e7ff"; ctx.font="bold 38px Trebuchet MS"; ctx.fillText("HOW TO PLAY", W/2, 64);
  ctx.fillStyle="#7a7a9a"; ctx.font="13px Trebuchet MS"; ctx.fillText("page "+(helpPage+1)+" / "+pages.length, W/2, 86);
  const L=W/2-300; let y=132;
  for(const [title,lines] of pg){
    ctx.textAlign="left"; ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText(title, L, y); y+=30;
    ctx.fillStyle="#cfcfe0"; ctx.font="16px Trebuchet MS";
    for(const line of lines){ for(const ln of wrap(line,600)){ ctx.fillText(ln, L, y); y+=22; } y+=4; }
    y+=18;
  }
  ctx.textAlign="center";
  if(isTouch){ const last=helpPage>=pages.length-1;
    pushBtn(uiButtons, W/2-170, H-58, 150, 42, "BACK", ()=>{ state=helpFrom; });
    pushBtn(uiButtons, W/2+20, H-58, 150, 42, last?"DONE":"NEXT", ()=>helpAdvance());
    uiButtons.forEach(drawBtn); }
  else { ctx.fillStyle="#7a7a9a"; ctx.font="13px Trebuchet MS";
    ctx.fillText(helpPage>=pages.length-1 ? "ENTER to finish      ESC / H to go back"
                                          : "ENTER / SPACE: next page      ESC / H: go back", W/2, H-28); } }
function drawBanner(){ const a=Math.min(1, banner.t/0.4); ctx.save(); ctx.globalAlpha=a; ctx.textAlign="center";
  ctx.fillStyle="rgba(5,5,12,0.6)"; ctx.fillRect(0,H*0.30,W,86);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 44px Trebuchet MS"; ctx.fillText(banner.big, W/2, H*0.30+44);
  ctx.fillStyle="#34e7ff"; ctx.font="18px Trebuchet MS"; ctx.fillText(banner.small, W/2, H*0.30+74);
  ctx.restore(); }
function drawLighting(){
  const darkA=Math.max(0.45,Math.min(0.95, 0.98-brightLevel*0.05)), amb=140+brightLevel*10;
  lctx.globalCompositeOperation="source-over"; lctx.fillStyle="rgba(2,2,12,"+darkA+")"; lctx.fillRect(0,0,W,H);
  const px=player.x-camX, py=player.y-camY; lctx.globalCompositeOperation="destination-out";
  let g=lctx.createRadialGradient(px,py,4,px,py,amb); g.addColorStop(0,"rgba(0,0,0,0.95)"); g.addColorStop(0.7,"rgba(0,0,0,0.6)"); g.addColorStop(1,"rgba(0,0,0,0)");
  lctx.fillStyle=g; lctx.beginPath(); lctx.arc(px,py,amb,0,7); lctx.fill();
  const a=player.aim, len=360, spread=0.62; lctx.beginPath(); lctx.moveTo(px,py); lctx.arc(px,py,len,a-spread,a+spread); lctx.closePath();
  let cg=lctx.createRadialGradient(px,py,10,px,py,len); cg.addColorStop(0,"rgba(0,0,0,1)"); cg.addColorStop(0.65,"rgba(0,0,0,0.55)"); cg.addColorStop(1,"rgba(0,0,0,0)");
  lctx.fillStyle=cg; lctx.fill(); lctx.globalCompositeOperation="source-over"; ctx.drawImage(lcv,0,0);
}

//============================================================ RETICLE + HUD
function drawReticle(){ const x=aimPt.x,y=aimPt.y; ctx.save(); ctx.globalCompositeOperation="lighter";
  if(player.armed){ const px=player.x-camX,py=player.y-camY; ctx.strokeStyle="rgba(52,231,255,0.22)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.stroke(); }
  ctx.strokeStyle="#34e7ff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,9,0,7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-15,y); ctx.lineTo(x-5,y); ctx.moveTo(x+5,y); ctx.lineTo(x+15,y); ctx.moveTo(x,y-15); ctx.lineTo(x,y-5); ctx.moveTo(x,y+5); ctx.lineTo(x,y+15); ctx.stroke();
  ctx.fillStyle="#fff"; ctx.fillRect(x-1,y-1,2,2); ctx.restore(); }
function wrap(text,max){ const words=text.split(" "); let line="",out=[]; for(const w of words){ const t=line?line+" "+w:w;
  if(ctx.measureText(t).width>max && line){ out.push(line); line=w; } else line=t; } if(line) out.push(line); return out; }
function drawHUD(){
  hudButtons.length=0;
  ctx.textAlign="left"; ctx.fillStyle="rgba(5,5,15,0.7)"; ctx.fillRect(0,0,W,40);
  ctx.fillStyle=god?"#ff7b00":"#ff3b3b"; ctx.font="bold 18px Trebuchet MS"; ctx.fillText(god?"GOD LEVEL":"NIGHT "+night, 16, 27);
  if(playerName){ ctx.fillStyle=cheatMoonk?"#f4d03f":"#7a7a9a"; ctx.font="12px Trebuchet MS"; ctx.fillText(playerName.toUpperCase(), 120, 26); }
  if(cheatMoonk){ ctx.fillStyle="#34e7ff"; ctx.font="bold 12px Trebuchet MS"; ctx.fillText("MOONK MODE", 120, 38); }
  const prog=Math.min(1,nightTime/NIGHT_LEN), hr=Math.floor(prog*6), label=(hr<=0?12:hr)+" AM";
  ctx.fillStyle="#e8e8f0"; ctx.font="bold 16px Trebuchet MS"; ctx.textAlign="center"; ctx.fillText(label, W/2, 17);
  ctx.fillStyle="#1a1a2e"; ctx.fillRect(W/2-90,22,180,4); ctx.fillStyle="#9a7bff"; ctx.fillRect(W/2-90,22,180*prog,4);
  ctx.textAlign="right"; ctx.fillStyle="#f4d03f"; ctx.font="bold 16px Trebuchet MS"; ctx.fillText("SCORE "+score, W-16, 19);
  ctx.fillStyle="#7a7a9a"; ctx.font="12px Trebuchet MS"; ctx.fillText("BEST NIGHT "+best+(muted?"   (muted)":""), W-16, 35);
  // boss bar
  if(boss && !boss.dead && player.armed){ const bw=420, bx=W/2-bw/2, byy=46;
    ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(bx-2,byy-2,bw+4,16);
    ctx.fillStyle="#3a0a0a"; ctx.fillRect(bx,byy,bw,12);
    ctx.fillStyle=boss.enraged?"#ff7b00":"#e02424"; ctx.fillRect(bx,byy,bw*Math.max(0,boss.hp/boss.maxHP),12);
    ctx.strokeStyle="#000"; ctx.lineWidth=1; ctx.strokeRect(bx,byy,bw,12);
    ctx.fillStyle="#fff"; ctx.font="bold 11px Trebuchet MS"; ctx.textAlign="center";
    ctx.fillText("FRANKIE THE HOTDOG"+(boss.enraged?"  -  ENRAGED!":""), W/2, byy+10.5); }
  // god-level: glizzy counter, or the BIG GLIZZLER health bar
  if(god && player.armed){
    if(glizzler && !glizzler.dead){ const bw=460, bx=W/2-bw/2, byy=46;
      ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(bx-2,byy-2,bw+4,18);
      ctx.fillStyle="#2a1400"; ctx.fillRect(bx,byy,bw,14);
      ctx.fillStyle="#ff7b00"; ctx.fillRect(bx,byy,bw*Math.max(0,glizzler.hp/glizzler.maxHP),14);
      ctx.strokeStyle="#000"; ctx.lineWidth=1; ctx.strokeRect(bx,byy,bw,14);
      ctx.fillStyle="#fff"; ctx.font="bold 12px Trebuchet MS"; ctx.textAlign="center"; ctx.fillText("THE BIG GLIZZLER", W/2, byy+11); }
    else { const left=glizzies.filter(g=>!g.dead).length;
      ctx.textAlign="center"; ctx.fillStyle="#ff7b00"; ctx.font="bold 16px Trebuchet MS";
      ctx.fillText("PHAT GLIZZYS LEFT: "+left+" / "+glizzies.length, W/2, 58); } }
  // kill-combo meter
  if(combo>2 && player.armed){ ctx.textAlign="center"; ctx.fillStyle=comboMul>=5?"#ff7b00":"#f4d03f"; ctx.font="bold 15px Trebuchet MS";
    ctx.fillText("x"+comboMul+"  COMBO", W/2, god?78:72); }
  // hp
  ctx.textAlign="left"; ctx.fillStyle="#1a1a2e"; ctx.fillRect(16,H-34,200,18);
  const ratio=Math.max(0,player.hp/player.maxHp), hpc=ratio>0.5?"#3ddc84":ratio>0.25?"#f4d03f":"#ff3b3b";
  ctx.fillStyle=hpc; ctx.fillRect(16,H-34,200*ratio,18);
  ctx.strokeStyle="#444"; ctx.lineWidth=1; ctx.strokeRect(16,H-34,200,18);
  ctx.fillStyle="#fff"; ctx.font="bold 12px Trebuchet MS"; ctx.fillText("HP "+Math.ceil(player.hp)+"/"+player.maxHp, 22, H-21);
  // weapons / objective
  if(player.armed){ let wx=300; ctx.textAlign="left";
    player.weapons.forEach((id,i)=>{ const on=i===player.weapon;
      ctx.fillStyle=on?"#34e7ff":"#222a3a"; ctx.fillRect(wx,H-36,74,22);
      ctx.fillStyle=on?"#04121a":"#90a0b8"; ctx.font="bold 11px Trebuchet MS"; ctx.fillText((i+1)+" "+WEAPONS[id].name, wx+5, H-21);
      if(isTouch) pushBtn(hudButtons, wx, H-38, 74, 26, "", ()=>player.weapon=i);
      wx+=80; });
    ctx.fillStyle=player.ammo>0?"#34e7ff":"#ff3b3b"; ctx.font="bold 18px Trebuchet MS"; ctx.fillText(player.ammoInfinite?"AMMO UNLIMITED":"AMMO "+player.ammo, wx+6, H-19);
  } else { ctx.fillStyle="#ffb74d"; ctx.font="bold 15px Trebuchet MS"; ctx.fillText("> Reach the LASER TAG ARENA and grab the gun!", 300, H-21); }
  if(isTouch && state==="play"){ pushBtn(hudButtons, W-52, 44, 42, 32, "II", togglePause); drawBtn(hudButtons[hudButtons.length-1]);
    pushBtn(hudButtons, W-100, 44, 42, 32, "[ ]", toggleFullscreen); drawBtn(hudButtons[hudButtons.length-1]);
    if(cheats.jump){ pushBtn(hudButtons, W-100, H-118, 88, 44, "JUMP", doJump); drawBtn(hudButtons[hudButtons.length-1]); } }
}
function dim(){ ctx.fillStyle="rgba(5,5,12,0.82)"; ctx.fillRect(0,0,W,H); }

  ctx.fillStyle=color; ctx.font="bold 56px Trebuchet MS"; ctx.fillText(title,W/2,H/2-10);
  ctx.fillStyle="#cfcfe0"; ctx.font="20px Trebuchet MS"; ctx.fillText(sub,W/2,H/2+34); }
function drawTitle(){ dim(); ctx.textAlign="center"; uiButtons.length=0;

function drawName(){ dim(); ctx.textAlign="center"; uiButtons.length=0;

function drawIntro(){ dim(); ctx.textAlign="center";
  ctx.fillStyle=god?"#ff7b00":"#ff3b3b"; ctx.font="bold 60px Trebuchet MS"; ctx.fillText(god?"GOD LEVEL":"NIGHT "+night, W/2, H/2-66);
  ctx.fillStyle="#9a7bff"; ctx.font="20px Trebuchet MS"; ctx.fillText(god?"THE FREEZER OPENS":"12 AM", W/2, H/2-32);

  if(player.newWeapon){ ctx.fillStyle="#f4d03f"; ctx.font="bold 19px Trebuchet MS"; ctx.fillText("NEW WEAPON: "+player.newWeapon.name+"  -  press "+player.newWeapon.key, W/2, H/2+70); }

function drawOver(){ dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 54px Trebuchet MS"; ctx.fillText("YOU GOT KETCHUP'D", W/2, H/2-28);
  ctx.fillStyle="#e8e8f0"; ctx.font="22px Trebuchet MS"; ctx.fillText((playerName?playerName+", ":"")+"Frankie got you on Night "+night, W/2, H/2+12);
  ctx.fillStyle="#f4d03f"; ctx.font="20px Trebuchet MS"; ctx.fillText("Score: "+score, W/2, H/2+44);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText(">  CLICK or press ENTER to retry", W/2, H/2+98); }
function drawWin(){ dim(); ctx.textAlign="center"; uiButtons.length=0;
  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size); } ctx.globalAlpha=1;
  ctx.fillStyle="#3ddc84"; ctx.font="bold 46px Trebuchet MS"; ctx.fillText("6 AM. FRANKIE FALLS.", W/2, H/2-92);
  ctx.fillStyle="#e8e8f0"; ctx.font="17px Trebuchet MS";
  wrap("Frankie collapses into a steaming pile of relish and regret. The park is yours again - and you'll smell like mustard for the rest of your life.",640).forEach((ln,i)=>ctx.fillText(ln,W/2,H/2-54+i*24));
  ctx.fillStyle="#f4d03f"; ctx.font="bold 20px Trebuchet MS"; ctx.fillText((playerName?playerName.toUpperCase()+" SURVIVED ALL 5 NIGHTS":"YOU SURVIVED ALL 5 NIGHTS")+"  -  Score: "+score, W/2, H/2+10);
  ctx.fillStyle="#ff7b00"; ctx.font="bold 24px Trebuchet MS"; ctx.fillText("...but the freezer is rumbling.", W/2, H/2+52);
  if(isTouch){ pushBtn(uiButtons, W/2-200, H/2+74, 190, 46, "GOD LEVEL", ()=>startGodLevel());
    pushBtn(uiButtons, W/2+10, H/2+74, 190, 46, "TITLE", ()=>{ state="title"; }); uiButtons.forEach(drawBtn); }
  else { ctx.fillStyle="#ff7b00"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText(">  press G for the GOD LEVEL  <", W/2, H/2+88);
    ctx.fillStyle="#5a5a7a"; ctx.font="14px Trebuchet MS"; ctx.fillText("5 PHAT GLIZZYS. they spit pigs in a blanket. ENTER for title instead.", W/2, H/2+116); } }
function drawGodWin(){ dim(); ctx.textAlign="center"; uiButtons.length=0;
  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size); } ctx.globalAlpha=1;

  ctx.fillStyle="#e8e8f0"; ctx.font="17px Trebuchet MS";
  wrap("The freezer goes quiet. Pigs in a blanket stop twitching. You are the undisputed king of Xtreme Action Park.",640).forEach((ln,i)=>ctx.fillText(ln,W/2,H/2+6+i*24));
  ctx.fillStyle="#f4d03f"; ctx.font="bold 20px Trebuchet MS"; ctx.fillText((playerName?playerName.toUpperCase():"YOU")+"  -  Score: "+score+(cheatMoonk?"   (MOONK MODE)":""), W/2, H/2+72);
  ctx.fillStyle="#5a5a7a"; ctx.font="14px Trebuchet MS"; ctx.fillText("CLICK or press ENTER for the title", W/2, H/2+104); }
function drawDifficulty(){ dim(); ctx.textAlign="center"; uiButtons.length=0;
  ctx.fillStyle="#34e7ff"; ctx.font="bold 36px Trebuchet MS"; ctx.fillText("PICK YOUR PAIN", W/2, 96);

    ctx.fillStyle=on?d.col:"#cfcfe0"; ctx.font="bold 26px Trebuchet MS"; ctx.fillText((on?"> ":"")+d.name, W/2, y-6);
    ctx.fillStyle=on?"#9fefff":"#7a7a9a"; ctx.font="14px Trebuchet MS"; ctx.fillText(d.sub, W/2, y+18);
    if(isTouch) pushBtn(uiButtons, W/2-300, y-44, 600, 76, "", ()=>diffSel=i); });
  if(isTouch){ pushBtn(uiButtons, W/2-150, H-58, 140, 40, "CONFIRM", ()=>{ localStorage.setItem("hotdogNights.diff",String(diffSel)); state="story"; storyPage=0; }); drawBtn(uiButtons[uiButtons.length-1]);
    pushBtn(uiButtons, W/2+10, H-58, 140, 40, "BACK", ()=>{ state="charselect"; }); drawBtn(uiButtons[uiButtons.length-1]); }
  else { ctx.fillStyle="#7a7a9a"; ctx.font="13px Trebuchet MS"; ctx.fillText("Left/Right to choose    ENTER to confirm    ESC to go back", W/2, H-40); } }
function drawPause(){ drawCenter("PAUSED", isTouch?"":"Press P to resume","#34e7ff"); uiButtons.length=0;
  if(isTouch){ pushBtn(uiButtons, W/2-160,H/2+48,150,44,"RESUME",()=>togglePause());
    pushBtn(uiButtons, W/2+10,H/2+48,150,44,"OPTIONS",()=>openSettings("pause"));
    pushBtn(uiButtons, W/2-160,H/2+106,150,40, muted?"UNMUTE":"MUTE", ()=>muted=!muted);
    pushBtn(uiButtons, W/2+10,H/2+106,150,40, "FULLSCREEN", ()=>toggleFullscreen());
    uiButtons.forEach(drawBtn); }
  else { ctx.textAlign="center"; ctx.fillStyle="#7a7a9a"; ctx.font="14px Trebuchet MS"; ctx.fillText("O: Options      M: "+(muted?"Unmute":"Mute"), W/2, H/2+74); } }
function drawSettings(){ dim(); ctx.textAlign="center"; uiButtons.length=0;
  ctx.fillStyle="#34e7ff"; ctx.font="bold 40px Trebuchet MS"; ctx.fillText("SETTINGS", W/2, 96);
  SETTINGS.forEach((s,i)=>{ const y=150+i*52, on=i===settingsSel;
    ctx.textAlign="left"; ctx.font="18px Trebuchet MS"; ctx.fillStyle=on?"#f4d03f":"#cfcfe0";
    ctx.fillText((on?"> ":"   ")+s.label, W/2-250, y);
    const frac=(opt[s.k]-s.min)/(s.max-s.min);
    ctx.fillStyle="#1a1a2e"; ctx.fillRect(W/2+30,y-14,150,16);
    ctx.fillStyle=on?"#34e7ff":"#3a6a78"; ctx.fillRect(W/2+30,y-14,150*frac,16);
    ctx.textAlign="left"; ctx.fillStyle="#fff"; ctx.font="bold 15px Trebuchet MS"; ctx.fillText(s.fmt(opt[s.k]), W/2+245, y-1);
    if(isTouch){ const setv=d=>{ settingsSel=i; opt[s.k]=Math.max(s.min,Math.min(s.max,opt[s.k]+d*s.step)); applySettings(); };
      pushBtn(uiButtons, W/2-22, y-19, 36, 30, "-", ()=>setv(-1)); drawBtn(uiButtons[uiButtons.length-1]);
      pushBtn(uiButtons, W/2+188, y-19, 36, 30, "+", ()=>setv(1)); drawBtn(uiButtons[uiButtons.length-1]); } });
  // subtle secret "?" - tap/click shows only "456..."; triple-tap opens the cheat console (touch path)
  const qx=W-44, qy=112; qHot={x:qx-16, y:qy-22, w:36, h:34};
  ctx.textAlign="center"; ctx.fillStyle="rgba(122,122,154,0.40)"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText("?", qx, qy);
  ctx.strokeStyle="rgba(122,122,154,0.22)"; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(qx,qy-7,15,0,7); ctx.stroke();
  if(isTouch) pushBtn(uiButtons, qHot.x, qHot.y, qHot.w, qHot.h, "", ()=>{ showQHint(); if(tripleTap("q")) openCheatConsole(); });
  ctx.textAlign="center";
  if(isTouch){ pushBtn(uiButtons, W/2-150, H-66, 140, 40, "SAVE & BACK", ()=>{ saveSettings(); state=settingsFrom; }); drawBtn(uiButtons[uiButtons.length-1]);
    pushBtn(uiButtons, W/2+10, H-66, 140, 40, "HOW TO PLAY", ()=>openHelp("settings")); drawBtn(uiButtons[uiButtons.length-1]); }
  else { ctx.fillStyle="#7a7a9a"; ctx.font="13px Trebuchet MS"; ctx.fillText("Up/Down select    Left/Right adjust    H: How to Play    ENTER or ESC to go back", W/2, H-40); } }
function drawCharSelect(){ dim(); ctx.textAlign="center"; uiButtons.length=0;

  const gap=W/(CHARS.length+1);
  CHARS.forEach((c,i)=>{ const x=gap*(i+1), y=H/2-20, on=i===charSel;
    if(on){ ctx.fillStyle="rgba(52,231,255,0.12)"; ctx.fillRect(x-58,y-92,116,176); ctx.strokeStyle="#34e7ff"; ctx.lineWidth=2; ctx.strokeRect(x-58,y-92,116,176); }
    drawSprite(SP_PLAYER, x, y-44, 5, 1, c);
    ctx.textAlign="center"; ctx.fillStyle=on?"#f4d03f":"#cfcfe0"; ctx.font="bold 18px Trebuchet MS"; ctx.fillText(c.name, x, y+34);
    ctx.fillStyle=on?"#9fefff":"#7a7a9a"; ctx.font="12px Trebuchet MS"; wrap(c.perk,108).forEach((ln,j)=>ctx.fillText(ln,x,y+54+j*15));
    if(isTouch) pushBtn(uiButtons, x-58, y-92, 116, 176, "", ()=>charSel=i); });
  if(isTouch){ pushBtn(uiButtons, W/2-150, H-66, 140, 42, "CONFIRM", ()=>{ localStorage.setItem("hotdogNights.char",String(charSel)); state="difficulty"; }); drawBtn(uiButtons[uiButtons.length-1]);
    pushBtn(uiButtons, W/2+10, H-66, 140, 42, "BACK", ()=>{ state="name"; }); drawBtn(uiButtons[uiButtons.length-1]); }
  else { ctx.fillStyle="#7a7a9a"; ctx.font="13px Trebuchet MS"; ctx.fillText("Left/Right to choose    ENTER to confirm    ESC to go back", W/2, H-40); } }

//============================================================ LOOP
let last=performance.now();
function frame(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  syncNameInput();
  if(cheatConsoleOpen && state!=="settings") closeCheatConsole();   // never leave the console hanging
  if(banner){ banner.t-=dt; if(banner.t<=0) banner=null; }
  if(state==="play") update(dt);
  if(state==="intro"){ introTimer-=dt; if(introTimer<=0) state="play"; }
  if(state==="win"||state==="godwin"){ for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.life-=dt; } parts=parts.filter(p=>p.life>0); }
  render(); requestAnimationFrame(frame);
}
buildMap(); player.x=22*TS+TS/2; player.y=16*TS+TS/2; requestAnimationFrame(frame);
})();
</script>
