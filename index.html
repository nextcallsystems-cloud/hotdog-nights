<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTDOG NIGHTS — Xtreme Action Park</title>
<style>
  :root { --neon:#ff3b3b; --cyan:#34e7ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#05050b; color:#e8e8f0;
    font-family:"Trebuchet MS","Segoe UI",sans-serif; overflow:hidden; }
  #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { background:#05050b; image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:100%; max-height:100%; box-shadow:0 0 60px rgba(255,59,59,.25),0 0 120px rgba(52,231,255,.15);
    border:2px solid #1a1a2e; touch-action:none; cursor:crosshair; }
  #hint { position:fixed; bottom:8px; left:0; right:0; text-align:center;
    font-size:12px; color:#5a5a7a; pointer-events:none; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="600"></canvas></div>
<div id="hint">WASD / Arrows move &nbsp;·&nbsp; Mouse aim &nbsp;·&nbsp; Click / Space shoot &nbsp;·&nbsp; P pause &nbsp;·&nbsp; M mute</div>
<script>
(() => {
"use strict";
//============================================================ SETUP
const cv = document.getElementById("game");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;            // viewport
ctx.imageSmoothingEnabled = false;

const TS = 32, MW = 44, MH = 32;              // tile size, map width/height (tiles)
const WORLD_W = MW * TS, WORLD_H = MH * TS;

// offscreen lighting canvas
const lcv = document.createElement("canvas"); lcv.width = W; lcv.height = H;
const lctx = lcv.getContext("2d");

//============================================================ INPUT
const keys = {};
let mouseX = W/2, mouseY = H/2, firing = false;
addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if ([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) e.preventDefault();
  if (k === "enter") startOrAdvance();
  if (k === "p" || k === "escape") togglePause();
  if (k === "m") muted = !muted;
});
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
function canvasPos(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX - r.left) * (W / r.width), y:(e.clientY - r.top) * (H / r.height) };
}
cv.addEventListener("mousemove", e => { const p = canvasPos(e); mouseX = p.x; mouseY = p.y; });
cv.addEventListener("mousedown", e => { audioInit(); if (state==="play") firing = true; else startOrAdvance(); });
addEventListener("mouseup", () => firing = false);
cv.addEventListener("contextmenu", e => e.preventDefault());

//============================================================ AUDIO
let actx = null, master = null, muted = false;
function audioInit(){ if (actx) return; try {
  actx = new (window.AudioContext||window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.35; master.connect(actx.destination);
} catch(e){} }
function beep(freq, dur, type="square", vol=1, slideTo=null){
  if (!actx || muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
  o.connect(g); g.connect(master); o.start(); o.stop(actx.currentTime + dur);
}
const sfx = {
  pew:   () => beep(880, 0.08, "square", 0.5, 320),
  hurt:  () => beep(140, 0.18, "sawtooth", 0.7, 60),
  growl: () => beep(70, 0.30, "sawtooth", 0.5, 45),
  kill:  () => { beep(200,0.12,"square",0.6,500); setTimeout(()=>beep(120,0.2,"sawtooth",0.5,40),60); },
  pickup:() => { beep(523,0.08,"square",0.5); setTimeout(()=>beep(784,0.12,"square",0.5),80); },
  ammo:  () => beep(660, 0.07, "triangle", 0.5, 880),
  empty: () => beep(180, 0.05, "square", 0.3),
  win:   () => [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"square",0.5),i*140)),
  lose:  () => [330,247,165].forEach((f,i)=>setTimeout(()=>beep(f,0.3,"sawtooth",0.5,f*0.6),i*180)),
};

//============================================================ SPRITES (string grids, scaled x3)
const PAL = {
  // player
  k:"#14141f", h:"#3a2410", s:"#e8b88a", b:"#2e86c1", p:"#34495e",
  // hotdog
  o:"#2a0f06", n:"#e0a86b", r:"#c0392b", d:"#8e2a1c", y:"#f4d03f", w:"#ffffff", t:"#fff2cf", l:"#5a2d10",
  // gun / crate
  c:"#34e7ff", g:"#888", a:"#caa24a", d:"#7a5a18",
};
const SP_PLAYER = [
  "..kkkk..",
  ".khhhhk.",
  ".kssssk.",
  ".kssssk.",
  ".kbbbbk.",
  "kbbbbbbk",
  "kbbbbbbk",
  ".kbbbbk.",
  ".kp..pk.",
  ".kp..pk.",
  ".kk..kk.",
  "........",
];
const SP_HOTDOG = [   // tall upright hotdog monster (11 wide x 18)
  "...ooooo...",
  "..odrrrdo..",
  ".odrrrrrdo.",
  ".orrrrrrro.",
  "orwwrrrwwro",  // angry eyes
  "orworrrowro",  // pupils
  "orrrrrrrrro",
  "oroooooooro",
  "orotototoro",  // jagged teeth
  "oroooooooro",
  ".orrrrrrro.",
  ".nnrrrrrnn.",  // bun + mustard body
  ".nnryrrrnn.",
  ".nnrrryrnn.",
  ".nnryrrrnn.",
  ".nnrrrrrnn.",
  "..nnrrrnn..",
  "..ll...ll..",  // stubby legs
];
const SP_GUN = [
  "........",
  "..cccc..",
  ".cccccg.",
  "ccccccgg",
  ".cc..ggg",
  ".gg.....",
  ".gg.....",
  "........",
];
const SP_CRATE = [
  "dddddd",
  "daaaad",
  "dadada",
  "dadada",
  "daaaad",
  "dddddd",
];
function drawSprite(grid, cx, cy, scale, flip=1){
  const gw = grid[0].length, gh = grid.length;
  const ox = cx - (gw*scale)/2, oy = cy - (gh*scale)/2;
  for (let row=0; row<gh; row++){
    const line = grid[row];
    for (let col=0; col<gw; col++){
      const ch = line[col]; if (ch === "." || ch === undefined) continue;
      const color = PAL[ch]; if (!color) continue;
      ctx.fillStyle = color;
      const dx = flip<0 ? ox + (gw-1-col)*scale : ox + col*scale;
      ctx.fillRect(Math.round(dx), Math.round(oy+row*scale), scale, scale);
    }
  }
}

//============================================================ MAP
const solid = Array.from({length:MH}, () => new Array(MW).fill(false));
function setBlock(x,y,w,h){ for(let j=0;j<h;j++) for(let i=0;i<w;i++){
  const ty=y+j, tx=x+i; if(ty>=0&&ty<MH&&tx>=0&&tx<MW) solid[ty][tx]=true; } }
function buildMap(){
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) solid[y][x]=false;
  for(let x=0;x<MW;x++){ solid[0][x]=true; solid[MH-1][x]=true; }
  for(let y=0;y<MH;y++){ solid[y][0]=true; solid[y][MW-1]=true; }
  // cover blocks (rides / machines) — kept clear of spawn + gun
  [[10,15,2,2],[18,8,3,1],[25,19,2,3],[34,16,2,2],[8,25,3,1],
   [20,13,1,4],[29,6,2,2],[15,27,2,2],[39,27,1,3],[6,7,2,1],
   [24,11,2,1],[12,21,1,3],[33,12,2,1]].forEach(b=>setBlock(...b));
}
const ZONES = [
  {name:"LASER TAG",     x:30,y:2, w:12,h:11, col:"#241a3a", lab:"#b39ddb"},
  {name:"ARCADE",        x:2, y:2, w:11,h:9,  col:"#16263a", lab:"#64b5f6"},
  {name:"GO-KART TRACK", x:14,y:22,w:16,h:8,  col:"#262626", lab:"#bdbdbd"},
  {name:"TRAMPOLINE",    x:2, y:18,w:10,h:12, col:"#13332f", lab:"#4db6ac"},
  {name:"CONCESSIONS",   x:33,y:22,w:9, h:7,  col:"#33240f", lab:"#ffb74d"},
];
function zoneColorAt(tx,ty){
  for (const z of ZONES) if (tx>=z.x&&tx<z.x+z.w&&ty>=z.y&&ty<z.y+z.h) return z.col;
  return "#181826";
}
function tileSolid(tx,ty){
  if (tx<0||ty<0||tx>=MW||ty>=MH) return true;
  return solid[ty][tx];
}
function collides(x,y,r){
  const minx=Math.floor((x-r)/TS), maxx=Math.floor((x+r)/TS);
  const miny=Math.floor((y-r)/TS), maxy=Math.floor((y+r)/TS);
  for(let ty=miny;ty<=maxy;ty++) for(let tx=minx;tx<=maxx;tx++)
    if (tileSolid(tx,ty)) return true;
  return false;
}
function moveEntity(e,dx,dy){
  if (!collides(e.x+dx,e.y,e.r)) e.x+=dx;
  if (!collides(e.x,e.y+dy,e.r)) e.y+=dy;
}
function freeWorldPoint(){ // random non-solid world position
  for(let i=0;i<200;i++){
    const tx=1+Math.floor(Math.random()*(MW-2)), ty=1+Math.floor(Math.random()*(MH-2));
    if(!solid[ty][tx]) return {x:tx*TS+TS/2, y:ty*TS+TS/2};
  }
  return {x:WORLD_W/2,y:WORLD_H/2};
}

//============================================================ ENTITIES & STATE
let state = "title";        // title | intro | play | pause | over | win
let night = 1, score = 0;
let best = parseInt(localStorage.getItem("hotdogNights.best")||"0",10);
const player = { x:0,y:0, r:11, hp:100, armed:false, aim:-Math.PI/2, lastHit:-10, fireCd:0, ammo:0, flip:1 };
let hotdogs = [], bullets = [], parts = [], crates = [];
let gun = null;             // pickup
let nightTime = 0, NIGHT_LEN = 70, introTimer = 0;
let crateTimer = 0, shake = 0;
const SPEED = 2.7, BULLET_SPD = 9, FIRE_CD = 0.16;

function cfg(n){ return {
  speed: 1.4 + 0.32*(n-1),
  maxHP: 3 + (n-1),
  count: n>=5?3 : n>=3?2 : 1,
  respawn: Math.max(1.2, 3 - 0.4*(n-1)),
  dmg: 16 + 3*(n-1),
}; }

function spawnHotdog(c, far=true){
  let p;
  do { p = freeWorldPoint(); }
  while (far && Math.hypot(p.x-player.x,p.y-player.y) < 360);
  return { x:p.x, y:p.y, r:15, hp:c.maxHP, maxHP:c.maxHP, dead:false, respawnT:0,
           wobble:Math.random()*6.28, flip:1, growl:Math.random()*3 };
}
function startNight(n){
  night = n; const c = cfg(n);
  buildMap();
  player.x = 22*TS+TS/2; player.y = 16*TS+TS/2;
  player.hp = Math.min(100, player.hp); player.fireCd = 0;
  if (n===1){ player.armed=false; player.ammo=0; gun = {x:36*TS+TS/2, y:7*TS+TS/2, t:0}; }
  else { gun = null; player.ammo = Math.min(99, player.ammo + 20); }
  hotdogs = []; for(let i=0;i<c.count;i++) hotdogs.push(spawnHotdog(c));
  bullets = []; parts = []; crates = []; crateTimer = 6; nightTime = 0; shake = 0;
}
function startOrAdvance(){
  audioInit();
  if (state==="title" || state==="over"){ night=1; score=0; player.hp=100; player.armed=false; player.ammo=0; startNight(1); state="intro"; introTimer=2.4; }
  else if (state==="win"){ state="title"; }
  else if (state==="intro"){ introTimer = 0; }
}
function togglePause(){ if (state==="play") state="pause"; else if (state==="pause") state="play"; }

//============================================================ PARTICLES
function burst(x,y,n,color,spd=4,life=0.5,size=3){
  for(let i=0;i<n;i++){ const a=Math.random()*6.28, s=Math.random()*spd;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,color,size}); }
}

//============================================================ UPDATE
function update(dt){
  const f = dt*60;
  player.fireCd = Math.max(0, player.fireCd - dt);
  shake = Math.max(0, shake - dt);

  // aim toward mouse (world space)
  const mwx = mouseX + camX, mwy = mouseY + camY;
  player.aim = Math.atan2(mwy - player.y, mwx - player.x);
  if (Math.cos(player.aim) !== 0) player.flip = Math.cos(player.aim) < 0 ? -1 : 1;

  // movement
  let dx=0, dy=0;
  if (keys["w"]||keys["arrowup"]) dy-=1;
  if (keys["s"]||keys["arrowdown"]) dy+=1;
  if (keys["a"]||keys["arrowleft"]) dx-=1;
  if (keys["d"]||keys["arrowright"]) dx+=1;
  if (dx||dy){ const m=Math.hypot(dx,dy); moveEntity(player, dx/m*SPEED*f, dy/m*SPEED*f); }

  // gun pickup
  if (gun){ gun.t += dt;
    if (Math.hypot(gun.x-player.x, gun.y-player.y) < 28){
      player.armed=true; player.ammo=40; gun=null; sfx.pickup();
      burst(player.x,player.y,24,"#34e7ff",5,0.6,3);
    }
  }
  // shooting
  if (firing || keys[" "]){
    if (player.armed && player.fireCd<=0){
      if (player.ammo>0){
        player.fireCd = FIRE_CD; player.ammo--;
        const a = player.aim + (Math.random()-0.5)*0.05;
        bullets.push({x:player.x+Math.cos(a)*16, y:player.y+Math.sin(a)*16,
                      vx:Math.cos(a)*BULLET_SPD, vy:Math.sin(a)*BULLET_SPD, life:0.7});
        burst(player.x+Math.cos(a)*18, player.y+Math.sin(a)*18, 3, "#fff7b0", 3, 0.12, 2);
        sfx.pew();
      } else { player.fireCd = 0.25; sfx.empty(); }
    }
  }
  // bullets
  for (const b of bullets){
    b.x += b.vx*f; b.y += b.vy*f; b.life -= dt;
    if (collides(b.x,b.y,2)){ b.life=0; burst(b.x,b.y,4,"#9fefff",3,0.2,2); continue; }
    for (const hd of hotdogs){ if (hd.dead) continue;
      if (Math.hypot(hd.x-b.x,hd.y-b.y) < hd.r){
        hd.hp--; b.life=0; burst(b.x,b.y,5,"#ff5252",3,0.3,2);
        if (hd.hp<=0){ hd.dead=true; hd.respawnT=cfg(night).respawn; score+=100;
          burst(hd.x,hd.y,30,"#c0392b",6,0.7,4); burst(hd.x,hd.y,14,"#f4d03f",5,0.6,3);
          shake=0.35; sfx.kill(); }
        break;
      }
    }
  }
  bullets = bullets.filter(b=>b.life>0);

  // hotdogs AI
  const c = cfg(night);
  for (const hd of hotdogs){
    if (hd.dead){ hd.respawnT -= dt;
      if (hd.respawnT<=0){ const n=spawnHotdog(c); Object.assign(hd,n); }
      continue; }
    hd.wobble += dt*8; hd.growl -= dt;
    if (hd.growl<=0){ const d=Math.hypot(hd.x-player.x,hd.y-player.y);
      if (d<360) sfx.growl(); hd.growl = 2+Math.random()*2; }
    const ang = Math.atan2(player.y-hd.y, player.x-hd.x);
    const sp = c.speed*f, bob = Math.sin(hd.wobble)*0.4*f;
    hd.flip = Math.cos(ang)<0 ? -1 : 1;
    moveEntity(hd, Math.cos(ang)*sp, Math.sin(ang)*sp + bob);
    // contact
    if (Math.hypot(hd.x-player.x,hd.y-player.y) < hd.r+player.r){
      if (nightTime - player.lastHit > 0.8){
        player.hp -= c.dmg; player.lastHit = nightTime; shake=0.4; sfx.hurt();
        burst(player.x,player.y,10,"#ff2d2d",4,0.4,3);
        const ka=Math.atan2(player.y-hd.y,player.x-hd.x);
        moveEntity(player, Math.cos(ka)*22, Math.sin(ka)*22);
        if (player.hp<=0){ player.hp=0; gameOver(); return; }
      }
    }
  }

  // ammo crates
  if (player.armed){ crateTimer -= dt;
    if (crateTimer<=0 && crates.length<2){ const p=freeWorldPoint(); crates.push({x:p.x,y:p.y}); crateTimer=11; }
    for (let i=crates.length-1;i>=0;i--){ const cr=crates[i];
      if (Math.hypot(cr.x-player.x,cr.y-player.y)<26){ player.ammo=Math.min(99,player.ammo+15);
        crates.splice(i,1); sfx.ammo(); burst(player.x,player.y,12,"#f4d03f",4,0.4,3); }
    }
  }

  // particles
  for (const p of parts){ p.x+=p.vx*f; p.y+=p.vy*f; p.vx*=0.92; p.vy*=0.92; p.life-=dt; }
  parts = parts.filter(p=>p.life>0);

  // night clock
  nightTime += dt;
  if (nightTime >= NIGHT_LEN){
    if (night >= 5){ winGame(); }
    else { player.hp = Math.min(100, player.hp+20); startNight(night+1); state="intro"; introTimer=2.4; }
  }
}
function gameOver(){ state="over"; firing=false; sfx.lose();
  if (night-1 > best){ /* nothing */ }
  const reached = night; if (reached>best){ best=reached; localStorage.setItem("hotdogNights.best",String(best)); }
}
function winGame(){ state="win"; firing=false; sfx.win();
  if (5>best){ best=5; localStorage.setItem("hotdogNights.best","5"); }
  for(let i=0;i<80;i++) parts.push({x:Math.random()*WORLD_W,y:Math.random()*WORLD_H,
    vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:2,max:2,
    color:["#ff3b3b","#34e7ff","#f4d03f","#fff"][i%4],size:4});
}

//============================================================ CAMERA
let camX=0, camY=0;
function updateCamera(){
  let sx=0, sy=0;
  if (shake>0){ sx=(Math.random()-0.5)*shake*30; sy=(Math.random()-0.5)*shake*30; }
  camX = Math.max(0, Math.min(WORLD_W-W, player.x - W/2)) + sx;
  camY = Math.max(0, Math.min(WORLD_H-H, player.y - H/2)) + sy;
}

//============================================================ RENDER
function render(){
  ctx.fillStyle = "#05050b"; ctx.fillRect(0,0,W,H);
  updateCamera();

  // floor + zones (visible tiles only)
  const tx0=Math.floor(camX/TS), ty0=Math.floor(camY/TS);
  const tx1=Math.ceil((camX+W)/TS), ty1=Math.ceil((camY+H)/TS);
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++){
    const sx=tx*TS-camX, sy=ty*TS-camY;
    if (tileSolid(tx,ty)){
      // raised solid block: bright top cap + side bevels + dark base = clearly "wall"
      ctx.fillStyle="#4a4a68"; ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle="#74749c"; ctx.fillRect(sx,sy,TS,6);          // top highlight
      ctx.fillStyle="#5c5c82"; ctx.fillRect(sx,sy,6,TS);          // left bevel
      ctx.fillStyle="#23233a"; ctx.fillRect(sx,sy+TS-6,TS,6);     // bottom shadow
      ctx.fillStyle="#1a1a28"; ctx.fillRect(sx+TS-4,sy,4,TS);     // right shadow
      ctx.strokeStyle="#15151f"; ctx.lineWidth=1; ctx.strokeRect(sx+0.5,sy+0.5,TS-1,TS-1);
    } else {
      // flat walkable floor: darker, with a clear inset grid tile
      ctx.fillStyle=zoneColorAt(tx,ty); ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
      ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=1; ctx.strokeRect(sx+0.5,sy+0.5,TS-1,TS-1);
    }
  }
  // zone labels
  ctx.font="bold 13px Trebuchet MS"; ctx.textAlign="center";
  for (const z of ZONES){ const lx=(z.x+z.w/2)*TS-camX, ly=z.y*TS-camY+16;
    if (lx>-80&&lx<W+80&&ly>-20&&ly<H+20){ ctx.fillStyle=z.lab; ctx.globalAlpha=0.55;
      ctx.fillText(z.name, lx, ly); ctx.globalAlpha=1; } }

  // crates
  for (const cr of crates) drawSprite(SP_CRATE, cr.x-camX, cr.y-camY, 4);
  // gun pickup
  if (gun){ const bob=Math.sin(gun.t*4)*4; drawSprite(SP_GUN, gun.x-camX, gun.y-camY-bob, 4); }

  // hotdogs (base sprite; glow added in emissive pass)
  for (const hd of hotdogs){ if (hd.dead) continue;
    drawSprite(SP_HOTDOG, hd.x-camX, hd.y-camY, 3, hd.flip); }

  // player
  drawSprite(SP_PLAYER, player.x-camX, player.y-camY, 3, player.flip);
  // gun barrel when armed
  if (player.armed){ const a=player.aim, bx=player.x-camX, by=player.y-camY;
    ctx.strokeStyle="#9a9aae"; ctx.lineWidth=4; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(a)*20, by+Math.sin(a)*20); ctx.stroke();
    ctx.strokeStyle="#34e7ff"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(a)*22, by+Math.sin(a)*22); ctx.stroke();
  }

  // particles (world)
  for (const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color;
    ctx.fillRect(p.x-camX-p.size/2, p.y-camY-p.size/2, p.size, p.size); }
  ctx.globalAlpha=1;

  // ===== LIGHTING =====
  drawLighting();

  // ===== EMISSIVE (drawn through dark) =====
  ctx.save(); ctx.globalCompositeOperation="lighter";
  // faint neon wall glow so obstacles are always readable in the dark
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++){
    if(!tileSolid(tx,ty)) continue;
    const sx=tx*TS-camX, sy=ty*TS-camY;
    ctx.fillStyle="rgba(86,96,150,0.16)"; ctx.fillRect(sx,sy,TS,TS);        // dim body
    if(!tileSolid(tx,ty-1)){ ctx.fillStyle="rgba(150,180,255,0.42)"; ctx.fillRect(sx,sy,TS,2); } // lit top edge
  }
  // hotdog menace glow + eyes
  for (const hd of hotdogs){ if (hd.dead) continue;
    const hx=hd.x-camX, hy=hd.y-camY, ey=hy-14;
    const rg=ctx.createRadialGradient(hx,hy,2,hx,hy,52);
    rg.addColorStop(0,"rgba(180,30,30,0.5)"); rg.addColorStop(1,"rgba(180,30,30,0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(hx,hy,52,0,7); ctx.fill();
    // glowing red eyes high on the face
    const eg=ctx.createRadialGradient(hx,ey,0,hx,ey,20);
    eg.addColorStop(0,"rgba(255,40,40,0.55)"); eg.addColorStop(1,"rgba(255,40,40,0)");
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(hx,ey,20,0,7); ctx.fill();
    ctx.fillStyle="#ff2a2a"; ctx.fillRect(hx-9,ey,4,4); ctx.fillRect(hx+5,ey,4,4);
  }
  // gun pickup beacon
  if (gun){ const gx=gun.x-camX, gy=gun.y-camY;
    const rg=ctx.createRadialGradient(gx,gy,2,gx,gy,60);
    rg.addColorStop(0,"rgba(52,231,255,0.6)"); rg.addColorStop(1,"rgba(52,231,255,0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(gx,gy,60,0,7); ctx.fill(); }
  // ammo crates beacon
  for (const cr of crates){ const cx=cr.x-camX, cy=cr.y-camY;
    const rg=ctx.createRadialGradient(cx,cy,1,cx,cy,30);
    rg.addColorStop(0,"rgba(244,208,63,0.5)"); rg.addColorStop(1,"rgba(244,208,63,0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,cy,30,0,7); ctx.fill(); }
  // bullets glow
  for (const b of bullets){ const bx=b.x-camX, by=b.y-camY;
    ctx.fillStyle="#cffaff"; ctx.fillRect(bx-2,by-2,4,4);
    const rg=ctx.createRadialGradient(bx,by,0,bx,by,10);
    rg.addColorStop(0,"rgba(52,231,255,0.9)"); rg.addColorStop(1,"rgba(52,231,255,0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(bx,by,10,0,7); ctx.fill(); }
  ctx.restore();

  if (state==="play"||state==="pause") drawReticle();
  cv.style.cursor = (state==="play"||state==="pause") ? "none" : "default";
  drawHUD();
  if (state==="title") drawTitle();
  if (state==="intro") drawIntro();
  if (state==="pause") drawCenter("PAUSED","Press P to resume","#34e7ff");
  if (state==="over") drawOver();
  if (state==="win") drawWin();
}

function drawLighting(){
  lctx.globalCompositeOperation="source-over";
  lctx.fillStyle="rgba(2,2,12,0.93)"; lctx.fillRect(0,0,W,H);
  const px=player.x-camX, py=player.y-camY;
  lctx.globalCompositeOperation="destination-out";
  // ambient
  let g=lctx.createRadialGradient(px,py,4,px,py,180);
  g.addColorStop(0,"rgba(0,0,0,0.95)"); g.addColorStop(0.7,"rgba(0,0,0,0.6)"); g.addColorStop(1,"rgba(0,0,0,0)");
  lctx.fillStyle=g; lctx.beginPath(); lctx.arc(px,py,180,0,7); lctx.fill();
  // flashlight cone toward aim
  const a=player.aim, len=360, spread=0.62;
  lctx.beginPath(); lctx.moveTo(px,py); lctx.arc(px,py,len,a-spread,a+spread); lctx.closePath();
  let cg=lctx.createRadialGradient(px,py,10,px,py,len);
  cg.addColorStop(0,"rgba(0,0,0,1)"); cg.addColorStop(0.65,"rgba(0,0,0,0.55)"); cg.addColorStop(1,"rgba(0,0,0,0)");
  lctx.fillStyle=cg; lctx.fill();
  lctx.globalCompositeOperation="source-over";
  ctx.drawImage(lcv,0,0);
}

//============================================================ RETICLE
function drawReticle(){
  const x=mouseX, y=mouseY;
  ctx.save(); ctx.globalCompositeOperation="lighter";
  // sight line from the player to where you're aiming
  if (player.armed){ const px=player.x-camX, py=player.y-camY;
    ctx.strokeStyle="rgba(52,231,255,0.22)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.stroke(); }
  // crosshair
  ctx.strokeStyle="#34e7ff"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,y,9,0,7); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x-15,y); ctx.lineTo(x-5,y); ctx.moveTo(x+5,y); ctx.lineTo(x+15,y);
  ctx.moveTo(x,y-15); ctx.lineTo(x,y-5); ctx.moveTo(x,y+5); ctx.lineTo(x,y+15);
  ctx.stroke();
  ctx.fillStyle="#ffffff"; ctx.fillRect(x-1,y-1,2,2);
  ctx.restore();
}

//============================================================ HUD
function drawHUD(){
  ctx.textAlign="left";
  // top bar
  ctx.fillStyle="rgba(5,5,15,0.7)"; ctx.fillRect(0,0,W,40);
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 18px Trebuchet MS";
  ctx.fillText("NIGHT "+night, 16, 27);
  // clock
  const prog=Math.min(1,nightTime/NIGHT_LEN), hr=Math.min(5,Math.floor(prog*6));
  const label=(hr===0?12:hr)+" AM";
  ctx.fillStyle="#e8e8f0"; ctx.font="bold 18px Trebuchet MS"; ctx.textAlign="center";
  ctx.fillText("🕛 "+label, W/2, 27);
  ctx.fillStyle="#1a1a2e"; ctx.fillRect(W/2-100,32,200,5);
  ctx.fillStyle="#34e7ff"; ctx.fillRect(W/2-100,32,200*prog,5);
  // score + best
  ctx.textAlign="right"; ctx.fillStyle="#f4d03f"; ctx.font="bold 16px Trebuchet MS";
  ctx.fillText("SCORE "+score, W-16, 19);
  ctx.fillStyle="#7a7a9a"; ctx.font="12px Trebuchet MS";
  ctx.fillText("BEST NIGHT "+best+(muted?"   🔇":""), W-16, 35);
  // health bar
  ctx.textAlign="left"; ctx.fillStyle="#1a1a2e"; ctx.fillRect(16,H-34,200,18);
  const hpc = player.hp>50?"#3ddc84":player.hp>25?"#f4d03f":"#ff3b3b";
  ctx.fillStyle=hpc; ctx.fillRect(16,H-34,200*(player.hp/100),18);
  ctx.strokeStyle="#444"; ctx.strokeRect(16,H-34,200,18);
  ctx.fillStyle="#fff"; ctx.font="bold 12px Trebuchet MS";
  ctx.fillText("HP "+Math.ceil(player.hp), 22, H-21);
  // ammo / objective
  if (player.armed){ ctx.fillStyle=player.ammo>0?"#34e7ff":"#ff3b3b"; ctx.font="bold 18px Trebuchet MS";
    ctx.fillText("AMMO "+player.ammo, 230, H-20); }
  else { ctx.fillStyle="#ffb74d"; ctx.font="bold 15px Trebuchet MS";
    ctx.fillText("► Reach the LASER TAG ARENA and grab the gun!", 230, H-21); }
}
function dim(){ ctx.fillStyle="rgba(5,5,12,0.78)"; ctx.fillRect(0,0,W,H); }
function drawCenter(title,sub,color){
  dim(); ctx.textAlign="center";
  ctx.fillStyle=color; ctx.font="bold 56px Trebuchet MS"; ctx.fillText(title,W/2,H/2-10);
  ctx.fillStyle="#cfcfe0"; ctx.font="20px Trebuchet MS"; ctx.fillText(sub,W/2,H/2+34);
}
function drawTitle(){
  dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 60px Trebuchet MS";
  ctx.fillText("HOTDOG NIGHTS", W/2, H/2-70);
  ctx.fillStyle="#34e7ff"; ctx.font="bold 24px Trebuchet MS";
  ctx.fillText(">>  XTREME ACTION PARK  <<", W/2, H/2-34);
  ctx.fillStyle="#cfcfe0"; ctx.font="16px Trebuchet MS";
  ctx.fillText("The hotdog statue wakes at midnight. Survive 5 nights.", W/2, H/2+6);
  ctx.fillText("Run to LASER TAG, grab the gun, fight back.", W/2, H/2+30);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS";
  ctx.fillText("▶  CLICK or press ENTER to start", W/2, H/2+86);
  ctx.fillStyle="#5a5a7a"; ctx.font="13px Trebuchet MS";
  ctx.fillText("WASD move · mouse aim · click/space shoot · P pause · M mute", W/2, H/2+120);
}
function drawIntro(){
  dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 64px Trebuchet MS"; ctx.fillText("NIGHT "+night, W/2, H/2-10);
  ctx.fillStyle="#e8e8f0"; ctx.font="22px Trebuchet MS"; ctx.fillText("12 AM", W/2, H/2+34);
  const c=cfg(night);
  ctx.fillStyle="#ffb74d"; ctx.font="15px Trebuchet MS";
  ctx.fillText(c.count>1?(c.count+" hotdogs tonight. They're faster and tougher."):"It's coming.", W/2, H/2+72);
  ctx.fillStyle="#5a5a7a"; ctx.font="13px Trebuchet MS";
  ctx.fillText("Press ENTER to skip", W/2, H/2+104);
}
function drawOver(){
  dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 56px Trebuchet MS"; ctx.fillText("YOU GOT KETCHUP'D", W/2, H/2-30);
  ctx.fillStyle="#e8e8f0"; ctx.font="22px Trebuchet MS";
  ctx.fillText("The hotdog got you on Night "+night, W/2, H/2+10);
  ctx.fillStyle="#f4d03f"; ctx.font="20px Trebuchet MS"; ctx.fillText("Score: "+score, W/2, H/2+42);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS";
  ctx.fillText("▶  CLICK or press ENTER to retry", W/2, H/2+96);
}
function drawWin(){
  dim(); ctx.textAlign="center";
  for (const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color;
    ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size); } ctx.globalAlpha=1;
  ctx.fillStyle="#3ddc84"; ctx.font="bold 50px Trebuchet MS";
  ctx.fillText("YOU SURVIVED ALL 5 NIGHTS!", W/2, H/2-20);
  ctx.fillStyle="#34e7ff"; ctx.font="22px Trebuchet MS";
  ctx.fillText("The park is yours again. Final score: "+score, W/2, H/2+20);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 20px Trebuchet MS";
  ctx.fillText("▶  CLICK or press ENTER for the title", W/2, H/2+76);
}

//============================================================ LOOP
let last = performance.now();
function frame(now){
  let dt = (now-last)/1000; last = now;
  dt = Math.min(dt, 0.05);
  if (state==="play") update(dt);
  if (state==="intro"){ introTimer -= dt; if (introTimer<=0) state="play"; }
  if (state==="win"){ for (const p of parts){ p.x+=p.vx; p.y+=p.vy; p.life-=dt; } parts=parts.filter(p=>p.life>0); }
  render();
  requestAnimationFrame(frame);
}
buildMap();
player.x=22*TS+TS/2; player.y=16*TS+TS/2;
requestAnimationFrame(frame);
})();
</script>
