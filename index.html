<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTDOG NIGHTS - Xtreme Action Park</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#05050b; color:#e8e8f0;
    font-family:"Trebuchet MS","Segoe UI",sans-serif; overflow:hidden; }
  #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { background:#05050b; image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:100%; max-height:100%; box-shadow:0 0 60px rgba(255,59,59,.25),0 0 120px rgba(52,231,255,.15);
    border:2px solid #1a1a2e; touch-action:none; cursor:crosshair; }
  #hint { position:fixed; bottom:8px; left:0; right:0; text-align:center;
    font-size:12px; color:#5a5a7a; pointer-events:none; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="600"></canvas></div>
<div id="hint">WASD move &nbsp;&middot;&nbsp; Mouse aim &nbsp;&middot;&nbsp; Click/Space shoot &nbsp;&middot;&nbsp; 1-4 weapons &nbsp;&middot;&nbsp; P pause &nbsp;&middot;&nbsp; M mute</div>
<script>
(() => {
"use strict";
//============================================================ SETUP
const cv = document.getElementById("game");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;
ctx.imageSmoothingEnabled = false;
const TS = 32, MW = 44, MH = 32;
const WORLD_W = MW*TS, WORLD_H = MH*TS;
const BS = 4; // boss sprite scale
const lcv = document.createElement("canvas"); lcv.width = W; lcv.height = H;
const lctx = lcv.getContext("2d");

//============================================================ INPUT
const keys = {};
let mouseX = W/2, mouseY = H/2, firing = false;
addEventListener("keydown", e => {
  const k = e.key.toLowerCase(); keys[k] = true;
  if ([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) e.preventDefault();
  if (k === "enter") startOrAdvance();
  if (k === "p" || k === "escape") togglePause();
  if (k === "m") muted = !muted;
  if (/^[1-9]$/.test(k) && player.weapons){ const i = +k-1; if (i < player.weapons.length) player.weapon = i; }
});
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
function canvasPos(e){ const r = cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) }; }
cv.addEventListener("mousemove", e => { const p = canvasPos(e); mouseX = p.x; mouseY = p.y; });
cv.addEventListener("mousedown", () => { audioInit(); if (state==="play") firing = true; else startOrAdvance(); });
addEventListener("mouseup", () => firing = false);
cv.addEventListener("contextmenu", e => e.preventDefault());
cv.addEventListener("wheel", e => { if (state==="play" && player.weapons.length>1){ e.preventDefault();
  player.weapon = (player.weapon + (e.deltaY>0?1:player.weapons.length-1)) % player.weapons.length; } }, {passive:false});

//============================================================ AUDIO
let actx=null, master=null, musicGain=null, muted=false, noiseBuf=null;
let musicTimer=null, mi=0;
function audioInit(){ if (actx) return; try {
  actx = new (window.AudioContext||window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.4; master.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = 0.5; musicGain.connect(master);
  noiseBuf = actx.createBuffer(1, actx.sampleRate*0.4, actx.sampleRate);
  const d = noiseBuf.getChannelData(0); for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  if (!musicTimer) musicTimer = setInterval(musicTick, 150);
} catch(e){} }
function beep(freq, dur, type="square", vol=1, slideTo=null){
  if (!actx || muted) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), actx.currentTime+dur);
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(actx.currentTime+dur);
}
function noise(dur, vol, freq=1000){ if (!actx||muted) return;
  const s=actx.createBufferSource(); s.buffer=noiseBuf;
  const g=actx.createGain(); g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  const f=actx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=freq;
  s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(actx.currentTime+dur);
}
function mnote(freq, dur, type, vol){ if (!actx||muted) return;
  const o=actx.createOscillator(), g=actx.createGain(); o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g); g.connect(musicGain); o.start(); o.stop(actx.currentTime+dur);
}
function musicTick(){
  if (!actx || muted || state!=="play") return;
  const enr = boss && boss.enraged;
  const bass=[55,55,65.4,49, 55,55,73.4,82.4];
  mnote(bass[mi%bass.length], 0.16, "triangle", 0.22);
  if (mi%2===0) mnote(40, 0.10, "sine", 0.5);     // kick
  noise(0.02, 0.04, 6500);                         // hat
  if (enr){ if (mi%2===0) mnote([330,392,247][mi%3], 0.10, "square", 0.10); }
  else if (mi%8===6) mnote([196,233][mi%2], 0.12, "square", 0.06);
  mi++;
}
const sfx = {
  pew:   () => beep(880, 0.07, "square", 0.45, 320),
  mg:    () => beep(720, 0.045, "square", 0.30, 480),
  boom:  () => { noise(0.18, 0.5, 1900); beep(95, 0.18, "sawtooth", 0.35, 40); },
  zap:   () => { beep(1300, 0.11, "sawtooth", 0.35, 280); },
  empty: () => beep(180, 0.05, "square", 0.25),
  pickup:() => { beep(523,0.08,"square",0.5); setTimeout(()=>beep(784,0.12,"square",0.5),80); setTimeout(()=>beep(1046,0.14,"square",0.5),180); },
  ammo:  () => beep(660, 0.07, "triangle", 0.45, 880),
  growl: (v=0.5) => { beep(66, 0.34, "sawtooth", v, 42); beep(52, 0.34, "square", v*0.5, 38); },
  splat: () => { noise(0.14, 0.35, 700); beep(160, 0.16, "sawtooth", 0.3, 60); },
  pop:   () => beep(300, 0.06, "square", 0.3, 150),
  bosshit:()=> beep(240, 0.04, "square", 0.18, 200),
  kill:  () => { beep(180,0.25,"sawtooth",0.5,40); setTimeout(()=>beep(120,0.3,"sawtooth",0.5,30),120); [523,659,880].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"square",0.4),200+i*120)); },
  win:   () => [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.2,"square",0.5),i*150)),
  lose:  () => [330,247,165,110].forEach((f,i)=>setTimeout(()=>beep(f,0.35,"sawtooth",0.5,f*0.6),i*200)),
};

//============================================================ SPRITES
const PAL = {
  k:"#14141f", h:"#3a2410", s:"#e8b88a", b:"#2e86c1", p:"#34495e",
  o:"#2a0f06", n:"#e0a86b", r:"#c0392b", d:"#8e2a1c", y:"#f4d03f", w:"#ffffff", t:"#fff2cf", l:"#5a2d10",
  c:"#34e7ff", g:"#888", a:"#caa24a", e:"#7a5a18",
};
const SP_PLAYER = ["..kkkk..",".khhhhk.",".kssssk.",".kssssk.",".kbbbbk.","kbbbbbbk","kbbbbbbk",".kbbbbk.",".kp..pk.",".kp..pk.",".kk..kk.","........"];
const SP_HOTDOG = ["...ooooo...","..odrrrdo..",".odrrrrrdo.",".orrrrrrro.","orwwrrrwwro","orworrrowro","orrrrrrrrro","oroooooooro","orotototoro","oroooooooro",".orrrrrrro.",".nnrrrrrnn.",".nnryrrrnn.",".nnrrryrnn.",".nnryrrrnn.",".nnrrrrrnn.","..nnrrrnn..","..ll...ll.."];
const SP_GUN = ["........","..cccc..",".cccccg.","ccccccgg",".cc..ggg",".gg.....",".gg.....","........"];
const SP_CRATE = ["eeeeee","eaaaae","eaeaea","eaeaea","eaaaae","eeeeee"];
function drawSprite(grid, cx, cy, scale, flip=1){
  const gw=grid[0].length, gh=grid.length, ox=cx-(gw*scale)/2, oy=cy-(gh*scale)/2;
  for (let row=0; row<gh; row++){ const line=grid[row];
    for (let col=0; col<gw; col++){ const ch=line[col]; if (ch===".") continue;
      const color=PAL[ch]; if (!color) continue; ctx.fillStyle=color;
      const dx = flip<0 ? ox+(gw-1-col)*scale : ox+col*scale;
      ctx.fillRect(Math.round(dx), Math.round(oy+row*scale), scale, scale); } }
}

//============================================================ WEAPONS
const WEAPONS = {
  pistol: {name:"PISTOL",  dmg:1.0, cd:0.16, pellets:1, spread:0.04, cost:1, speed:9,  pierce:0, color:"#34e7ff", sound:"pew"},
  smg:    {name:"MG",      dmg:0.7, cd:0.07, pellets:1, spread:0.11, cost:1, speed:10, pierce:0, color:"#7fffd4", sound:"mg"},
  shotgun:{name:"SHOTGUN", dmg:0.8, cd:0.55, pellets:6, spread:0.42, cost:3, speed:9,  pierce:0, color:"#ffd24a", sound:"boom"},
  plasma: {name:"PLASMA",  dmg:2.4, cd:0.24, pellets:1, spread:0.02, cost:2, speed:13, pierce:2, color:"#ff5ae0", sound:"zap"},
};

//============================================================ MAP
const solid = Array.from({length:MH}, () => new Array(MW).fill(false));
function setBlock(x,y,w,h){ for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const ty=y+j,tx=x+i;
  if(ty>=0&&ty<MH&&tx>=0&&tx<MW) solid[ty][tx]=true; } }
function buildMap(){
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) solid[y][x]=false;
  for(let x=0;x<MW;x++){ solid[0][x]=true; solid[MH-1][x]=true; }
  for(let y=0;y<MH;y++){ solid[y][0]=true; solid[y][MW-1]=true; }
  [[10,15,2,2],[18,8,3,1],[25,19,2,3],[34,16,2,2],[8,25,3,1],
   [20,13,1,4],[29,6,2,2],[15,27,2,2],[39,27,1,3],[6,7,2,1],
   [24,11,2,1],[12,21,1,3],[33,12,2,1]].forEach(b=>setBlock(...b));
}
const ZONES = [
  {name:"LASER TAG",     x:30,y:2, w:12,h:11, col:"#241a3a", lab:"#b39ddb"},
  {name:"ARCADE",        x:2, y:2, w:11,h:9,  col:"#16263a", lab:"#64b5f6"},
  {name:"GO-KART TRACK", x:14,y:22,w:16,h:8,  col:"#262626", lab:"#bdbdbd"},
  {name:"TRAMPOLINE",    x:2, y:18,w:10,h:12, col:"#13332f", lab:"#4db6ac"},
  {name:"CONCESSIONS",   x:33,y:22,w:9, h:7,  col:"#33240f", lab:"#ffb74d"},
];
function zoneColorAt(tx,ty){ for(const z of ZONES) if(tx>=z.x&&tx<z.x+z.w&&ty>=z.y&&ty<z.y+z.h) return z.col; return "#181826"; }
function tileSolid(tx,ty){ if(tx<0||ty<0||tx>=MW||ty>=MH) return true; return solid[ty][tx]; }
function collides(x,y,r){
  const minx=Math.floor((x-r)/TS),maxx=Math.floor((x+r)/TS),miny=Math.floor((y-r)/TS),maxy=Math.floor((y+r)/TS);
  for(let ty=miny;ty<=maxy;ty++) for(let tx=minx;tx<=maxx;tx++) if(tileSolid(tx,ty)) return true; return false;
}
function moveEntity(e,dx,dy){ if(!collides(e.x+dx,e.y,e.r)) e.x+=dx; if(!collides(e.x,e.y+dy,e.r)) e.y+=dy; }
function freeWorldPoint(){ for(let i=0;i<200;i++){ const tx=1+Math.floor(Math.random()*(MW-2)),ty=1+Math.floor(Math.random()*(MH-2));
  if(!solid[ty][tx]) return {x:tx*TS+TS/2,y:ty*TS+TS/2}; } return {x:WORLD_W/2,y:WORLD_H/2}; }
function farPoint(){ let p; for(let i=0;i<60;i++){ p=freeWorldPoint(); if(Math.hypot(p.x-player.x,p.y-player.y)>380) return p; } return p; }

//============================================================ STATE
let state="title", night=1, score=0, storyPage=0;
let best=parseInt(localStorage.getItem("hotdogNights.best")||"0",10);
const player={ x:0,y:0,r:11,hp:100,armed:false,aim:-Math.PI/2,lastHit:-10,fireCd:0,ammo:0,flip:1,
  weapons:[],weapon:0,newWeapon:null };
let boss=null, bullets=[], globs=[], packets=[], parts=[], crates=[], gun=null;
let nightTime=0, NIGHT_LEN=80, introTimer=0, crateTimer=0, shake=0;
const SPEED=2.7;

function cfg(n){ return {
  speed: 1.15 + 0.2*(n-1),
  hp: 16 + Math.round((n-1)*13),
  contact: 14 + 3*(n-1),
  packets: n>=2, packetEvery: Math.max(3.2, 6-0.6*(n-1)), packetBurst: n>=4?3:2,
  shoot: n>=3, shootEvery: Math.max(2.2, 4.2-0.55*(n-1)), shootSpread: n>=5,
}; }

const STORY = [
  ["XTREME ACTION PARK - 11:58 PM", "You stayed late counting laser-tag tokens. The last car left an hour ago, and every gate is locked."],
  ["MIDNIGHT", "The power dies. Out front, the 30-foot mascot - FRANKIE THE HOTDOG - peels himself off his pole and drops to the pavement."],
  ["HE'S HUNGRY", "Years of spilled ketchup and grease soaked into that statue. Now it walks. And you are locked in with it."],
  ["YOUR ONLY SHOT", "There are blasters racked in the Laser Tag Arena. Grab one. Survive five nights. Put the hotdog down for good."],
];
const BEAT = {
  1:"Frankie lurches out of the dark. Get to the LASER TAG ARENA, grab the gun, and don't let him touch you.",
  2:"Now he flings crawling ketchup packets. Gun them down before they reach you.",
  3:"Frankie spits ketchup globs across the park. Keep moving and dodge them.",
  4:"Faster. Angrier. Packets AND globs at the same time. Stay sharp.",
  5:"Final night. Everything he's got. End it.",
};

function beginRun(){ night=1; score=0; player.hp=100; player.armed=false; player.weapons=[]; player.weapon=0; player.ammo=0;
  startNight(1); state="intro"; introTimer=2.6; }
function grantFor(n){ const map={2:"smg",3:"shotgun",4:"plasma"}; const id=map[n]; if(!id) return;
  if(!player.weapons.includes(id)){ player.weapons.push(id); player.weapon=player.weapons.length-1;
    player.newWeapon={name:WEAPONS[id].name, key:player.weapons.length}; } }
function startNight(n){
  night=n; const c=cfg(n); buildMap();
  player.x=22*TS+TS/2; player.y=16*TS+TS/2; player.fireCd=0; player.newWeapon=null;
  if(n===1){ player.armed=false; player.weapons=[]; player.weapon=0; player.ammo=0; gun={x:36*TS+TS/2,y:7*TS+TS/2,t:0}; }
  else { player.armed=true; gun=null; grantFor(n); player.ammo=Math.min(99, player.ammo+30); }
  const p=farPoint();
  boss={ x:p.x,y:p.y,r:20,hp:c.hp,maxHP:c.hp,wobble:Math.random()*6,growlT:1,flip:1,
         atkP:c.packetEvery*0.7, atkS:c.shootEvery, tele:0, enraged:false, hitFlash:0, dead:false };
  bullets=[]; globs=[]; packets=[]; parts=[]; crates=[]; crateTimer=6; nightTime=0; shake=0;
}
function startOrAdvance(){ audioInit();
  if(state==="title"){ state="story"; storyPage=0; }
  else if(state==="story"){ storyPage++; if(storyPage>=STORY.length) beginRun(); }
  else if(state==="intro"){ introTimer=0; }
  else if(state==="over"){ beginRun(); }
  else if(state==="win"){ state="title"; }
}
function togglePause(){ if(state==="play") state="pause"; else if(state==="pause") state="play"; }

//============================================================ HELPERS
function burst(x,y,n,color,spd=4,life=0.5,size=3){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=Math.random()*spd;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,color,size}); } }
function gameOver(){ state="over"; firing=false; sfx.lose(); if(night>best){ best=night; localStorage.setItem("hotdogNights.best",String(best)); } }
function winGame(){ state="win"; firing=false; sfx.win(); if(5>best){ best=5; localStorage.setItem("hotdogNights.best","5"); }
  parts=[]; for(let i=0;i<90;i++) parts.push({x:Math.random()*WORLD_W,y:Math.random()*WORLD_H,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:2.4,max:2.4,color:["#ff3b3b","#34e7ff","#f4d03f","#fff"][i%4],size:4}); }
function clearNight(){ score+=500; shake=0.6; sfx.kill();
  burst(boss.x,boss.y,60,"#c0392b",7,1.0,5); burst(boss.x,boss.y,30,"#f4d03f",6,0.9,4);
  if(night>=5) winGame();
  else { player.hp=Math.min(100, player.hp+25); startNight(night+1); state="intro"; introTimer=2.8; } }
function fireGlobs(c,enr){ const base=Math.atan2(player.y-boss.y, player.x-boss.x);
  const angs = c.shootSpread ? [base-0.28,base,base+0.28] : [base]; const spd=3.4*(enr?1.25:1);
  angs.forEach(a=>globs.push({x:boss.x+Math.cos(a)*22,y:boss.y+Math.sin(a)*22,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:2.6,r:9,dmg:12}));
  sfx.splat(); }

//============================================================ UPDATE
function update(dt){
  const f=dt*60;
  player.fireCd=Math.max(0,player.fireCd-dt); shake=Math.max(0,shake-dt);
  const mwx=mouseX+camX, mwy=mouseY+camY;
  player.aim=Math.atan2(mwy-player.y, mwx-player.x);
  if(Math.cos(player.aim)!==0) player.flip=Math.cos(player.aim)<0?-1:1;

  // movement
  let dx=0,dy=0;
  if(keys["w"]||keys["arrowup"]) dy-=1;
  if(keys["s"]||keys["arrowdown"]) dy+=1;
  if(keys["a"]||keys["arrowleft"]) dx-=1;
  if(keys["d"]||keys["arrowright"]) dx+=1;
  if(dx||dy){ const m=Math.hypot(dx,dy); moveEntity(player,dx/m*SPEED*f,dy/m*SPEED*f); }

  // gun pickup
  if(gun){ gun.t+=dt; if(Math.hypot(gun.x-player.x,gun.y-player.y)<28){
    player.armed=true; player.weapons=["pistol"]; player.weapon=0; player.ammo=40; gun=null; sfx.pickup();
    burst(player.x,player.y,24,"#34e7ff",5,0.6,3); } }

  // shooting
  const wpn = player.armed ? WEAPONS[player.weapons[player.weapon]] : null;
  if((firing||keys[" "]) && wpn && player.fireCd<=0){
    if(player.ammo>=wpn.cost){ player.ammo-=wpn.cost; player.fireCd=wpn.cd;
      for(let i=0;i<wpn.pellets;i++){ const a=player.aim+(Math.random()-0.5)*wpn.spread;
        bullets.push({x:player.x+Math.cos(a)*16,y:player.y+Math.sin(a)*16,vx:Math.cos(a)*wpn.speed,vy:Math.sin(a)*wpn.speed,life:0.7,dmg:wpn.dmg,pierce:wpn.pierce,color:wpn.color}); }
      burst(player.x+Math.cos(player.aim)*18, player.y+Math.sin(player.aim)*18, 3, "#fff7b0", 3, 0.1, 2);
      sfx[wpn.sound]();
    } else { player.fireCd=0.25; sfx.empty(); }
  }

  // bullets
  for(const b of bullets){ b.x+=b.vx*f; b.y+=b.vy*f; b.life-=dt;
    if(collides(b.x,b.y,2)){ b.life=0; burst(b.x,b.y,4,"#9fefff",3,0.2,2); continue; }
    if(boss&&!boss.dead && Math.hypot(boss.x-b.x,boss.y-b.y)<boss.r){
      boss.hp-=b.dmg; boss.hitFlash=0.09; sfx.bosshit(); burst(b.x,b.y,4,"#fff",3,0.2,2);
      if(b.pierce>0) b.pierce--; else b.life=0;
      if(boss.hp<=0 && !boss.dead){ boss.dead=true; clearNight(); return; } }
    if(b.life<=0) continue;
    for(const pk of packets){ if(pk.dead) continue;
      if(Math.hypot(pk.x-b.x,pk.y-b.y)<pk.r+2){ pk.dead=true; score+=15; burst(pk.x,pk.y,8,"#c0392b",4,0.3,2); sfx.pop();
        if(b.pierce>0) b.pierce--; else b.life=0; break; } }
  }
  bullets=bullets.filter(b=>b.life>0);

  // boss
  if(boss && !boss.dead){
    const c=cfg(night); boss.hitFlash=Math.max(0,boss.hitFlash-dt); boss.wobble+=dt*8;
    if(nightTime>=NIGHT_LEN && !boss.enraged){ boss.enraged=true; sfx.growl(1); shake=0.4; }
    const enr=boss.enraged;
    boss.growlT-=dt;
    if(boss.growlT<=0){ const d=Math.hypot(boss.x-player.x,boss.y-player.y);
      const v=Math.max(0.12,0.7*(1-d/460)); sfx.growl(enr?Math.min(1,v+0.2):v); boss.growlT=(enr?1.0:1.7)+Math.random(); }
    const ang=Math.atan2(player.y-boss.y, player.x-boss.x);
    const sp=c.speed*(enr?1.4:1)*(boss.tele>0?0.3:1)*f, bob=Math.sin(boss.wobble)*0.4*f;
    boss.flip=Math.cos(ang)<0?-1:1;
    moveEntity(boss, Math.cos(ang)*sp, Math.sin(ang)*sp+bob);
    if(Math.hypot(boss.x-player.x,boss.y-player.y)<boss.r+player.r){
      if(nightTime-player.lastHit>0.8){ player.hp-=c.contact; player.lastHit=nightTime; shake=0.4; sfx.hurt();
        burst(player.x,player.y,10,"#ff2d2d",4,0.4,3);
        const ka=Math.atan2(player.y-boss.y,player.x-boss.x); moveEntity(player,Math.cos(ka)*24,Math.sin(ka)*24);
        if(player.hp<=0){ player.hp=0; gameOver(); return; } } }
    if(c.packets){ boss.atkP-=dt; if(boss.atkP<=0){ const n=c.packetBurst+(enr?1:0);
      for(let i=0;i<n && packets.length<10;i++){ const a=Math.random()*6.28, d=24+Math.random()*16;
        packets.push({x:boss.x+Math.cos(a)*d,y:boss.y+Math.sin(a)*d,r:9,dead:false,wob:Math.random()*6}); }
      sfx.pop(); boss.atkP=c.packetEvery*(enr?0.6:1); } }
    if(c.shoot){ if(boss.tele>0){ boss.tele-=dt; if(boss.tele<=0){ fireGlobs(c,enr); boss.atkS=c.shootEvery*(enr?0.6:1); } }
      else { boss.atkS-=dt; if(boss.atkS<=0) boss.tele=0.6; } }
  }

  // ketchup globs
  for(const g of globs){ g.x+=g.vx*f; g.y+=g.vy*f; g.life-=dt;
    if(collides(g.x,g.y,3)){ g.life=0; burst(g.x,g.y,8,"#b01818",3,0.4,3); continue; }
    if(Math.hypot(g.x-player.x,g.y-player.y)<player.r+g.r){ g.life=0; player.hp-=g.dmg; player.lastHit=nightTime; shake=0.3; sfx.hurt();
      burst(player.x,player.y,12,"#c0392b",4,0.5,3); if(player.hp<=0){ player.hp=0; gameOver(); return; } } }
  globs=globs.filter(g=>g.life>0);

  // packet minions
  for(const pk of packets){ if(pk.dead) continue; pk.wob+=dt*10;
    const a=Math.atan2(player.y-pk.y,player.x-pk.x), sp=1.25*(boss&&boss.enraged?1.3:1)*f;
    moveEntity(pk, Math.cos(a)*sp, Math.sin(a)*sp);
    if(Math.hypot(pk.x-player.x,pk.y-player.y)<player.r+pk.r){ pk.dead=true; player.hp-=8; player.lastHit=nightTime; shake=0.2; sfx.pop();
      burst(player.x,player.y,8,"#c0392b",3,0.4,2); if(player.hp<=0){ player.hp=0; gameOver(); return; } } }
  packets=packets.filter(p=>!p.dead);

  // ammo crates
  if(player.armed){ crateTimer-=dt; if(crateTimer<=0 && crates.length<2){ const p=freeWorldPoint(); crates.push({x:p.x,y:p.y}); crateTimer=10; }
    for(let i=crates.length-1;i>=0;i--){ const cr=crates[i];
      if(Math.hypot(cr.x-player.x,cr.y-player.y)<26){ player.ammo=Math.min(99,player.ammo+15); crates.splice(i,1); sfx.ammo(); burst(player.x,player.y,12,"#f4d03f",4,0.4,3); } } }

  // particles + clock
  for(const p of parts){ p.x+=p.vx*f; p.y+=p.vy*f; p.vx*=0.92; p.vy*=0.92; p.life-=dt; }
  parts=parts.filter(p=>p.life>0);
  nightTime+=dt;
}

//============================================================ CAMERA
let camX=0, camY=0;
function updateCamera(){ let sx=0,sy=0; if(shake>0){ sx=(Math.random()-0.5)*shake*30; sy=(Math.random()-0.5)*shake*30; }
  camX=Math.max(0,Math.min(WORLD_W-W,player.x-W/2))+sx; camY=Math.max(0,Math.min(WORLD_H-H,player.y-H/2))+sy; }

//============================================================ RENDER
function render(){
  ctx.fillStyle="#05050b"; ctx.fillRect(0,0,W,H); updateCamera();
  const tx0=Math.floor(camX/TS),ty0=Math.floor(camY/TS),tx1=Math.ceil((camX+W)/TS),ty1=Math.ceil((camY+H)/TS);
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++){ const sx=tx*TS-camX, sy=ty*TS-camY;
    if(tileSolid(tx,ty)){
      ctx.fillStyle="#4a4a68"; ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle="#74749c"; ctx.fillRect(sx,sy,TS,6);
      ctx.fillStyle="#5c5c82"; ctx.fillRect(sx,sy,6,TS);
      ctx.fillStyle="#23233a"; ctx.fillRect(sx,sy+TS-6,TS,6);
      ctx.fillStyle="#1a1a28"; ctx.fillRect(sx+TS-4,sy,4,TS);
      ctx.strokeStyle="#15151f"; ctx.lineWidth=1; ctx.strokeRect(sx+0.5,sy+0.5,TS-1,TS-1);
    } else { ctx.fillStyle=zoneColorAt(tx,ty); ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
      ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=1; ctx.strokeRect(sx+0.5,sy+0.5,TS-1,TS-1); }
  }
  ctx.font="bold 13px Trebuchet MS"; ctx.textAlign="center";
  for(const z of ZONES){ const lx=(z.x+z.w/2)*TS-camX, ly=z.y*TS-camY+16;
    if(lx>-80&&lx<W+80&&ly>-20&&ly<H+20){ ctx.fillStyle=z.lab; ctx.globalAlpha=0.55; ctx.fillText(z.name,lx,ly); ctx.globalAlpha=1; } }

  for(const cr of crates) drawSprite(SP_CRATE, cr.x-camX, cr.y-camY, 4);
  if(gun){ const bob=Math.sin(gun.t*4)*4; drawSprite(SP_GUN, gun.x-camX, gun.y-camY-bob, 4); }

  // packets
  for(const pk of packets){ if(pk.dead) continue; const x=pk.x-camX, y=pk.y-camY+Math.sin(pk.wob)*2;
    ctx.fillStyle="#7a1010"; ctx.fillRect(x-7,y-6,14,12);
    ctx.fillStyle="#c0392b"; ctx.fillRect(x-6,y-5,12,10);
    ctx.fillStyle="#fff"; ctx.fillRect(x-5,y-4,10,3); }
  // globs
  for(const g of globs){ const x=g.x-camX,y=g.y-camY;
    ctx.fillStyle="#7a1010"; ctx.beginPath(); ctx.arc(x,y,g.r,0,7); ctx.fill();
    ctx.fillStyle="#c0392b"; ctx.beginPath(); ctx.arc(x,y,g.r-2,0,7); ctx.fill(); }

  // boss
  if(boss && !boss.dead){ const bx=boss.x-camX, by=boss.y-camY;
    drawSprite(SP_HOTDOG, bx, by, BS, boss.flip);
    if(boss.hitFlash>0){ ctx.save(); ctx.globalAlpha=Math.min(1,boss.hitFlash*6); ctx.fillStyle="#fff"; ctx.fillRect(bx-22,by-36,44,72); ctx.restore(); } }

  // player
  drawSprite(SP_PLAYER, player.x-camX, player.y-camY, 3, player.flip);
  if(player.armed){ const a=player.aim, bx=player.x-camX, by=player.y-camY;
    ctx.strokeStyle="#9a9aae"; ctx.lineWidth=4; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(a)*20,by+Math.sin(a)*20); ctx.stroke();
    const wpn=WEAPONS[player.weapons[player.weapon]];
    ctx.strokeStyle=wpn.color; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(a)*22,by+Math.sin(a)*22); ctx.stroke(); }

  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size); }
  ctx.globalAlpha=1;

  drawLighting();

  // EMISSIVE
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(let ty=ty0;ty<=ty1;ty++) for(let tx=tx0;tx<=tx1;tx++){ if(!tileSolid(tx,ty)) continue; const sx=tx*TS-camX, sy=ty*TS-camY;
    ctx.fillStyle="rgba(86,96,150,0.16)"; ctx.fillRect(sx,sy,TS,TS);
    if(!tileSolid(tx,ty-1)){ ctx.fillStyle="rgba(150,180,255,0.42)"; ctx.fillRect(sx,sy,TS,2); } }
  if(boss && !boss.dead){ const bx=boss.x-camX, by=boss.y-camY, ey=by-BS*4;
    const r=boss.tele>0?66:54, col=boss.tele>0?"255,150,40":(boss.enraged?"255,40,40":"180,30,30");
    let rg=ctx.createRadialGradient(bx,by-10,2,bx,by-10,r); rg.addColorStop(0,"rgba("+col+",0.5)"); rg.addColorStop(1,"rgba("+col+",0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(bx,by-10,r,0,7); ctx.fill();
    let eg=ctx.createRadialGradient(bx,ey,0,bx,ey,26); eg.addColorStop(0,"rgba(255,40,40,0.6)"); eg.addColorStop(1,"rgba(255,40,40,0)");
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(bx,ey,26,0,7); ctx.fill();
    ctx.fillStyle="#ff2a2a"; ctx.fillRect(bx-13,ey-2,6,6); ctx.fillRect(bx+7,ey-2,6,6); }
  for(const g of globs){ const x=g.x-camX,y=g.y-camY; let rg=ctx.createRadialGradient(x,y,0,x,y,g.r+9);
    rg.addColorStop(0,"rgba(255,40,40,0.7)"); rg.addColorStop(1,"rgba(255,40,40,0)"); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(x,y,g.r+9,0,7); ctx.fill(); }
  for(const pk of packets){ if(pk.dead) continue; const x=pk.x-camX,y=pk.y-camY; let rg=ctx.createRadialGradient(x,y,0,x,y,16);
    rg.addColorStop(0,"rgba(210,50,50,0.4)"); rg.addColorStop(1,"rgba(210,50,50,0)"); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(x,y,16,0,7); ctx.fill(); }
  if(gun){ const gx=gun.x-camX,gy=gun.y-camY; let rg=ctx.createRadialGradient(gx,gy,2,gx,gy,60);
    rg.addColorStop(0,"rgba(52,231,255,0.6)"); rg.addColorStop(1,"rgba(52,231,255,0)"); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(gx,gy,60,0,7); ctx.fill(); }
  for(const cr of crates){ const cx=cr.x-camX,cy=cr.y-camY; let rg=ctx.createRadialGradient(cx,cy,1,cx,cy,30);
    rg.addColorStop(0,"rgba(244,208,63,0.5)"); rg.addColorStop(1,"rgba(244,208,63,0)"); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,cy,30,0,7); ctx.fill(); }
  for(const b of bullets){ const bx=b.x-camX,by=b.y-camY; ctx.fillStyle="#fff"; ctx.fillRect(bx-2,by-2,4,4);
    let rg=ctx.createRadialGradient(bx,by,0,bx,by,10); rg.addColorStop(0,b.color); rg.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(bx,by,10,0,7); ctx.fill(); }
  ctx.restore();

  if(state==="play"||state==="pause") drawReticle();
  cv.style.cursor = (state==="play"||state==="pause") ? "none" : "default";
  drawHUD();
  if(state==="title") drawTitle();
  if(state==="story") drawStory();
  if(state==="intro") drawIntro();
  if(state==="pause") drawCenter("PAUSED","Press P to resume","#34e7ff");
  if(state==="over") drawOver();
  if(state==="win") drawWin();
}
function drawLighting(){
  lctx.globalCompositeOperation="source-over"; lctx.fillStyle="rgba(2,2,12,0.93)"; lctx.fillRect(0,0,W,H);
  const px=player.x-camX, py=player.y-camY; lctx.globalCompositeOperation="destination-out";
  let g=lctx.createRadialGradient(px,py,4,px,py,180); g.addColorStop(0,"rgba(0,0,0,0.95)"); g.addColorStop(0.7,"rgba(0,0,0,0.6)"); g.addColorStop(1,"rgba(0,0,0,0)");
  lctx.fillStyle=g; lctx.beginPath(); lctx.arc(px,py,180,0,7); lctx.fill();
  const a=player.aim, len=360, spread=0.62; lctx.beginPath(); lctx.moveTo(px,py); lctx.arc(px,py,len,a-spread,a+spread); lctx.closePath();
  let cg=lctx.createRadialGradient(px,py,10,px,py,len); cg.addColorStop(0,"rgba(0,0,0,1)"); cg.addColorStop(0.65,"rgba(0,0,0,0.55)"); cg.addColorStop(1,"rgba(0,0,0,0)");
  lctx.fillStyle=cg; lctx.fill(); lctx.globalCompositeOperation="source-over"; ctx.drawImage(lcv,0,0);
}

//============================================================ RETICLE + HUD
function drawReticle(){ const x=mouseX,y=mouseY; ctx.save(); ctx.globalCompositeOperation="lighter";
  if(player.armed){ const px=player.x-camX,py=player.y-camY; ctx.strokeStyle="rgba(52,231,255,0.22)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.stroke(); }
  ctx.strokeStyle="#34e7ff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,9,0,7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-15,y); ctx.lineTo(x-5,y); ctx.moveTo(x+5,y); ctx.lineTo(x+15,y); ctx.moveTo(x,y-15); ctx.lineTo(x,y-5); ctx.moveTo(x,y+5); ctx.lineTo(x,y+15); ctx.stroke();
  ctx.fillStyle="#fff"; ctx.fillRect(x-1,y-1,2,2); ctx.restore(); }
function wrap(text,max){ const words=text.split(" "); let line="",out=[]; for(const w of words){ const t=line?line+" "+w:w;
  if(ctx.measureText(t).width>max && line){ out.push(line); line=w; } else line=t; } if(line) out.push(line); return out; }
function drawHUD(){
  ctx.textAlign="left"; ctx.fillStyle="rgba(5,5,15,0.7)"; ctx.fillRect(0,0,W,40);
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 18px Trebuchet MS"; ctx.fillText("NIGHT "+night, 16, 27);
  const prog=Math.min(1,nightTime/NIGHT_LEN), hr=Math.min(5,Math.floor(prog*6)), label=(hr===0?12:hr)+" AM";
  ctx.fillStyle="#e8e8f0"; ctx.font="bold 16px Trebuchet MS"; ctx.textAlign="center"; ctx.fillText(label, W/2, 17);
  ctx.fillStyle="#1a1a2e"; ctx.fillRect(W/2-90,22,180,4); ctx.fillStyle="#9a7bff"; ctx.fillRect(W/2-90,22,180*prog,4);
  ctx.textAlign="right"; ctx.fillStyle="#f4d03f"; ctx.font="bold 16px Trebuchet MS"; ctx.fillText("SCORE "+score, W-16, 19);
  ctx.fillStyle="#7a7a9a"; ctx.font="12px Trebuchet MS"; ctx.fillText("BEST NIGHT "+best+(muted?"   (muted)":""), W-16, 35);
  // boss bar
  if(boss && !boss.dead && player.armed){ const bw=420, bx=W/2-bw/2, byy=46;
    ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(bx-2,byy-2,bw+4,16);
    ctx.fillStyle="#3a0a0a"; ctx.fillRect(bx,byy,bw,12);
    ctx.fillStyle=boss.enraged?"#ff7b00":"#e02424"; ctx.fillRect(bx,byy,bw*Math.max(0,boss.hp/boss.maxHP),12);
    ctx.strokeStyle="#000"; ctx.lineWidth=1; ctx.strokeRect(bx,byy,bw,12);
    ctx.fillStyle="#fff"; ctx.font="bold 11px Trebuchet MS"; ctx.textAlign="center";
    ctx.fillText("FRANKIE THE HOTDOG"+(boss.enraged?"  -  ENRAGED!":""), W/2, byy+10.5); }
  // hp
  ctx.textAlign="left"; ctx.fillStyle="#1a1a2e"; ctx.fillRect(16,H-34,200,18);
  const hpc=player.hp>50?"#3ddc84":player.hp>25?"#f4d03f":"#ff3b3b"; ctx.fillStyle=hpc; ctx.fillRect(16,H-34,200*(player.hp/100),18);
  ctx.strokeStyle="#444"; ctx.lineWidth=1; ctx.strokeRect(16,H-34,200,18);
  ctx.fillStyle="#fff"; ctx.font="bold 12px Trebuchet MS"; ctx.fillText("HP "+Math.ceil(player.hp), 22, H-21);
  // weapons / objective
  if(player.armed){ let wx=300; ctx.textAlign="left";
    player.weapons.forEach((id,i)=>{ const on=i===player.weapon;
      ctx.fillStyle=on?"#34e7ff":"#222a3a"; ctx.fillRect(wx,H-36,74,22);
      ctx.fillStyle=on?"#04121a":"#90a0b8"; ctx.font="bold 11px Trebuchet MS"; ctx.fillText((i+1)+" "+WEAPONS[id].name, wx+5, H-21); wx+=80; });
    ctx.fillStyle=player.ammo>0?"#34e7ff":"#ff3b3b"; ctx.font="bold 18px Trebuchet MS"; ctx.fillText("AMMO "+player.ammo, wx+6, H-19);
  } else { ctx.fillStyle="#ffb74d"; ctx.font="bold 15px Trebuchet MS"; ctx.fillText("> Reach the LASER TAG ARENA and grab the gun!", 300, H-21); }
}
function dim(){ ctx.fillStyle="rgba(5,5,12,0.82)"; ctx.fillRect(0,0,W,H); }
function drawCenter(title,sub,color){ dim(); ctx.textAlign="center";
  ctx.fillStyle=color; ctx.font="bold 56px Trebuchet MS"; ctx.fillText(title,W/2,H/2-10);
  ctx.fillStyle="#cfcfe0"; ctx.font="20px Trebuchet MS"; ctx.fillText(sub,W/2,H/2+34); }
function drawTitle(){ dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 60px Trebuchet MS"; ctx.fillText("HOTDOG NIGHTS", W/2, H/2-78);
  ctx.fillStyle="#34e7ff"; ctx.font="bold 24px Trebuchet MS"; ctx.fillText(">>  XTREME ACTION PARK  <<", W/2, H/2-42);
  ctx.fillStyle="#cfcfe0"; ctx.font="16px Trebuchet MS"; ctx.fillText("The mascot wakes at midnight. Five nights. One hotdog. Survive.", W/2, H/2+2);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText(">  CLICK or press ENTER", W/2, H/2+62);
  ctx.fillStyle="#5a5a7a"; ctx.font="13px Trebuchet MS"; ctx.fillText("WASD move | mouse aim | click/space shoot | 1-4 swap weapon | P pause | M mute", W/2, H/2+100); }
function drawStory(){ dim(); ctx.textAlign="center"; const s=STORY[Math.min(storyPage,STORY.length-1)];
  ctx.fillStyle="#ff6b3b"; ctx.font="bold 34px Trebuchet MS"; ctx.fillText(s[0], W/2, H/2-70);
  ctx.fillStyle="#e8e8f0"; ctx.font="19px Trebuchet MS"; wrap(s[1],620).forEach((ln,i)=>ctx.fillText(ln, W/2, H/2-26+i*28));
  ctx.fillStyle="#5a5a7a"; ctx.font="13px Trebuchet MS"; ctx.fillText("ENTER to continue  ("+(storyPage+1)+"/"+STORY.length+")", W/2, H/2+96); }
function drawIntro(){ dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 60px Trebuchet MS"; ctx.fillText("NIGHT "+night, W/2, H/2-66);
  ctx.fillStyle="#9a7bff"; ctx.font="20px Trebuchet MS"; ctx.fillText("12 AM", W/2, H/2-32);
  ctx.fillStyle="#e8e8f0"; ctx.font="16px Trebuchet MS"; wrap(BEAT[night]||"",620).forEach((ln,i)=>ctx.fillText(ln, W/2, H/2+2+i*24));
  if(player.newWeapon){ ctx.fillStyle="#f4d03f"; ctx.font="bold 19px Trebuchet MS"; ctx.fillText("NEW WEAPON: "+player.newWeapon.name+"  -  press "+player.newWeapon.key, W/2, H/2+70); }
  ctx.fillStyle="#5a5a7a"; ctx.font="13px Trebuchet MS"; ctx.fillText("ENTER to begin", W/2, H/2+104); }
function drawOver(){ dim(); ctx.textAlign="center";
  ctx.fillStyle="#ff3b3b"; ctx.font="bold 54px Trebuchet MS"; ctx.fillText("YOU GOT KETCHUP'D", W/2, H/2-28);
  ctx.fillStyle="#e8e8f0"; ctx.font="22px Trebuchet MS"; ctx.fillText("Frankie got you on Night "+night, W/2, H/2+12);
  ctx.fillStyle="#f4d03f"; ctx.font="20px Trebuchet MS"; ctx.fillText("Score: "+score, W/2, H/2+44);
  ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText(">  CLICK or press ENTER to retry", W/2, H/2+98); }
function drawWin(){ dim(); ctx.textAlign="center";
  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color; ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size); } ctx.globalAlpha=1;
  ctx.fillStyle="#3ddc84"; ctx.font="bold 46px Trebuchet MS"; ctx.fillText("6 AM. FRANKIE FALLS.", W/2, H/2-44);
  ctx.fillStyle="#e8e8f0"; ctx.font="18px Trebuchet MS";
  wrap("Frankie collapses into a steaming pile of relish and regret. The park is yours again - and you'll smell like mustard for the rest of your life.",640).forEach((ln,i)=>ctx.fillText(ln,W/2,H/2-6+i*26));
  ctx.fillStyle="#f4d03f"; ctx.font="bold 22px Trebuchet MS"; ctx.fillText("YOU SURVIVED ALL 5 NIGHTS  -  Score: "+score, W/2, H/2+70);
  ctx.fillStyle="#5a5a7a"; ctx.font="14px Trebuchet MS"; ctx.fillText("CLICK or press ENTER for the title", W/2, H/2+104); }

//============================================================ LOOP
let last=performance.now();
function frame(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  if(state==="play") update(dt);
  if(state==="intro"){ introTimer-=dt; if(introTimer<=0) state="play"; }
  if(state==="win"){ for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.life-=dt; } parts=parts.filter(p=>p.life>0); }
  render(); requestAnimationFrame(frame);
}
buildMap(); player.x=22*TS+TS/2; player.y=16*TS+TS/2; requestAnimationFrame(frame);
})();
</script>
